<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RATU COLLECTION | Official Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { 
            --shopee-orange: #ee4d2d; 
            --gold: #D4AF37; 
            --bg-light: #f5f5f5; 
            --white: #ffffff;
            --shadow: 0 2px 10px rgba(0,0,0,0.05);
        }

        body { 
            background-color: var(--bg-light); 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto;
            margin: 0; padding-bottom: 80px; overflow-x: hidden; 
        }

        /* --- LOADING INTRO --- */
        #intro-overlay {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            animation: fadeOut 1s ease 3s forwards;
        }
        .intro-logo {
            width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--gold);
            object-fit: cover; filter: drop-shadow(0 0 15px var(--gold));
            animation: pulseIn 2s infinite ease-in-out;
        }
        @keyframes pulseIn { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* --- HEADER & NAV --- */
        .shopee-header { 
            background: linear-gradient(-180deg,#f53d2d,#ff6633); 
            position: sticky; top: 0; z-index: 5000;
        }
        .search-container { background: #fff; height: 38px; border-radius: 2px; }

        /* --- TRUE PORTRAIT SYSTEM (3:4 Ratio) --- */
        .portrait-box {
            position: relative;
            width: 100%;
            padding-top: 133.33%; /* Rasio 3:4 Tegak Lurus */
            overflow: hidden;
            background: #eee;
        }
        .portrait-box img {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover; /* Memaksa gambar mengisi kotak potret */
        }

        /* --- PRODUCT STYLING --- */
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 8px; }
        .product-card { 
            background: var(--white); border-radius: 4px; overflow: hidden; 
            box-shadow: var(--shadow); transition: 0.2s;
        }
        .product-card:active { transform: scale(0.96); }

        /* --- MODAL SYSTEM --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            z-index: 9999; display: none; align-items: flex-end;
            backdrop-filter: blur(3px);
        }
        .modal-body {
            background: #fff; width: 100%; max-height: 90vh;
            border-top-left-radius: 20px; border-top-right-radius: 20px;
            padding: 20px; overflow-y: auto; transform: translateY(100%);
            transition: transform 0.4s ease;
        }
        .modal-active { display: flex; }
        .modal-active .modal-body { transform: translateY(0); }

        .form-group { margin-bottom: 12px; }
        .form-label { font-size: 11px; font-weight: bold; color: #888; text-transform: uppercase; margin-left: 4px; }
        .input-ratu {
            width: 100%; border: 1px solid #ddd; padding: 12px; border-radius: 8px;
            font-size: 14px; outline: none; transition: 0.3s;
        }
        .input-ratu:focus { border-color: var(--shopee-orange); background: #fffaf9; }

        .btn-shopee {
            background-color: var(--shopee-orange); color: #fff;
            width: 100%; padding: 15px; border-radius: 4px;
            font-weight: bold; font-size: 16px; text-transform: uppercase;
        }

        /* --- UTILS --- */
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Floating Admin */
        #admin-panel {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 350px; background: white; z-index: 10001;
            padding: 20px; border-radius: 12px; display: none; box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <img src="Gemini_Generated_Image_gfusskgfusskgfus.png" class="intro-logo" onerror="this.src='https://via.placeholder.com/150?text=RATU'">
        <div class="mt-4 text-white font-bold tracking-[0.3em]">RATU COLLECTION</div>
    </div>

    <header class="shopee-header p-3 shadow-lg">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full border-2 border-white overflow-hidden bg-white">
                <img src="Gemini_Generated_Image_gfusskgfusskgfus.png" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/50?text=R'">
            </div>
            <div class="flex-1 search-container flex items-center px-3">
                <i class="fas fa-search text-gray-400 mr-2 text-sm"></i>
                <input type="text" placeholder="Cari Koleksi Ratu..." class="w-full outline-none text-sm text-gray-700 bg-transparent">
            </div>
            <div class="relative cursor-pointer" onclick="toggleCart()">
                <i class="fas fa-shopping-cart text-white text-xl"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-white text-red-600 text-[10px] font-bold px-1.5 rounded-full border border-red-500">0</span>
            </div>
        </div>
    </header>

    <div class="bg-white p-3 mb-2 flex justify-between overflow-x-auto no-scrollbar gap-6">
        <div class="flex flex-col items-center min-w-[50px]">
            <div class="w-10 h-10 bg-orange-100 rounded-xl flex items-center justify-center text-orange-600 mb-1"><i class="fas fa-bolt"></i></div>
            <span class="text-[9px]">Flash Sale</span>
        </div>
        <div class="flex flex-col items-center min-w-[50px]">
            <div class="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center text-blue-600 mb-1"><i class="fas fa-truck"></i></div>
            <span class="text-[9px]">Gratis Ongkir</span>
        </div>
        <div class="flex flex-col items-center min-w-[50px]">
            <div class="w-10 h-10 bg-yellow-100 rounded-xl flex items-center justify-center text-yellow-600 mb-1"><i class="fas fa-coins"></i></div>
            <span class="text-[9px]">Koin Ratu</span>
        </div>
        <div class="flex flex-col items-center min-w-[50px]">
            <div class="w-10 h-10 bg-red-100 rounded-xl flex items-center justify-center text-red-600 mb-1"><i class="fas fa-gift"></i></div>
            <span class="text-[9px]">Voucher</span>
        </div>
        <div class="flex flex-col items-center min-w-[50px]">
            <div class="w-10 h-10 bg-purple-100 rounded-xl flex items-center justify-center text-purple-600 mb-1"><i class="fas fa-crown"></i></div>
            <span class="text-[9px]">Exclusive</span>
        </div>
    </div>

    <main>
        <div class="flex items-center gap-2 px-3 py-2">
            <div class="h-4 w-1 bg-red-500 rounded-full"></div>
            <h2 class="text-sm font-bold text-gray-800 uppercase tracking-widest">Rekomendasi Ratu</h2>
        </div>
        
        <div id="grid-container" class="product-grid">
            </div>
    </main>

    <div id="modal-detail" class="modal-overlay" onclick="closeM('modal-detail')">
        <div class="modal-body" onclick="event.stopPropagation()">
            <div class="flex gap-4 mb-6">
                <div class="w-32 h-44 rounded-lg overflow-hidden border shadow-sm">
                    <img id="det-img" src="" class="w-full h-full object-cover">
                </div>
                <div class="flex-1">
                    <p id="det-price" class="text-2xl font-bold text-red-600"></p>
                    <p class="text-xs text-gray-400 mt-1">Stok: 99+ Tersedia</p>
                    <div class="mt-4 flex gap-2">
                        <span class="text-[10px] bg-red-50 text-red-500 border border-red-200 px-1">Garansi Ori</span>
                        <span class="text-[10px] bg-green-50 text-green-500 border border-green-200 px-1">Free Ongkir</span>
                    </div>
                </div>
            </div>
            <div class="border-t pt-4">
                <h3 id="det-name" class="font-bold text-gray-800 text-lg mb-2"></h3>
                <p id="det-desc" class="text-sm text-gray-500 leading-relaxed h-24 overflow-y-auto"></p>
            </div>
            <button onclick="goToCheckout()" class="btn-shopee mt-6 shadow-xl">Beli Sekarang</button>
        </div>
    </div>

    <div id="modal-checkout" class="modal-overlay" onclick="closeM('modal-checkout')">
        <div class="modal-body" onclick="event.stopPropagation()">
            <h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
                <i class="fas fa-map-marker-alt text-red-500"></i> Alamat Pengiriman
            </h3>
            
            <div class="form-group">
                <label class="form-label">Provinsi</label>
                <input type="text" id="in-prov" placeholder="Contoh: Jawa Tengah" class="input-ratu">
            </div>
            <div class="form-group">
                <label class="form-label">Kota / Kabupaten</label>
                <input type="text" id="in-kota" placeholder="Contoh: Semarang" class="input-ratu">
            </div>
            <div class="form-group">
                <label class="form-label">Desa / Kelurahan</label>
                <input type="text" id="in-desa" placeholder="Contoh: Kelurahan Mentari" class="input-ratu">
            </div>
            <div class="flex gap-2 mb-4">
                <div class="w-1/2">
                    <label class="form-label">RT/RW</label>
                    <input type="text" id="in-rt" placeholder="01/02" class="input-ratu">
                </div>
                <div class="w-1/2">
                    <label class="form-label">No. Rumah</label>
                    <input type="text" id="in-rumah" placeholder="No. 12" class="input-ratu">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Metode Pembayaran</label>
                <select id="in-pay" class="input-ratu bg-gray-50 font-bold text-gray-700">
                    <option value="Transfer BCA">Transfer Bank BCA</option>
                    <option value="DANA / ShopeePay">E-Wallet (DANA/SPay)</option>
                    <option value="COD - Bayar di Tempat">COD (Bayar di Tempat)</option>
                </select>
            </div>

            <button onclick="finishToWA()" class="btn-shopee mt-4 bg-black border-t-4 border-red-500">Kirim Pesanan ke WhatsApp</button>
        </div>
    </div>

    <nav class="fixed bottom-0 inset-x-0 bg-white border-t flex justify-around py-3 z-[4000]">
        <div class="text-orange-600 text-center"><i class="fas fa-home text-xl"></i><p class="text-[10px]">Home</p></div>
        <div class="text-gray-400 text-center" onclick="alert('Belum ada Feed terbaru')"><i class="fas fa-play-circle text-xl"></i><p class="text-[10px]">Feed</p></div>
        <div class="text-gray-400 text-center" onclick="alert('Belum ada Live')"><i class="fas fa-video text-xl"></i><p class="text-[10px]">Live</p></div>
        <div class="text-gray-400 text-center" onclick="showAdmin()"><i class="fas fa-user text-xl"></i><p class="text-[10px]">Saya</p></div>
    </nav>

    <div id="admin-panel">
        <h4 class="font-bold border-b pb-2 mb-4">Admin Config</h4>
        <input type="text" id="adm-wa" placeholder="Nomor WA (628...)" class="input-ratu mb-4">
        <button onclick="saveAdmin()" class="w-full bg-gray-800 text-white py-2 rounded">Update WA Target</button>
        <button onclick="hideAdmin()" class="w-full text-xs text-gray-400 mt-2">Batal</button>
    </div>

    <audio id="ratu-audio" src="trtasfiq-sad-piano-instrumental-background-music-279069 (1).mp3" loop></audio>

    <script>
        // --- KONFIGURASI DATA ---
        let adminWA = "6285640056650";
        let activeProduct = null;

        // Gunakan fungsi encodeURIComponent otomatis untuk file dengan spasi
        const rawProducts = [
            { 
                id: 1, 
                name: "Wong Urip Signature - Royal Collection Black Edition", 
                price: 0, 
                priceDisp: "Hubungi Admin", 
                img: "foto-1 2026-03-19 at 13.40.41.jpeg",
                desc: "Koleksi paling prestisius dari Ratu Collection. Menggunakan bahan kain pilihan yang memberikan kenyamanan maksimal dan aura kemewahan seketika." 
            },
            { 
                id: 2, 
                name: "Mba Simbet Elegant Dress - Pearl White Silk", 
                price: 0, 
                priceDisp: "Exclusive Item", 
                img: "WhatsApp Image 2026-03-19 at 13.40.16.jpeg",
                desc: "Gaun sutra premium dengan potongan elegan yang dirancang khusus untuk Ratu. Cocok untuk acara gala, pernikahan, atau pertemuan resmi." 
            },
            { 
                id: 3, 
                name: "Gold Majesty Handbag - International Grade", 
                price: 1550000, 
                priceDisp: "Rp 1.550.000", 
                img: "https://images.unsplash.com/photo-1584916201218-f4242ceb4809?w=500&q=80",
                desc: "Tas tangan mewah dengan aksen emas murni di bagian logo. Didesain oleh desainer internasional eksklusif untuk pasar global." 
            },
            { 
                id: 4, 
                name: "Royal Crown Diamond Ring 24K", 
                price: 5200000, 
                priceDisp: "Rp 5.200.000", 
                img: "https://images.unsplash.com/photo-1605100804763-247f66122bc8?w=500&q=80",
                desc: "Perhiasan mahakarya dengan taburan berlian simulasi kualitas terbaik. Menjadikan jemari Ratu pusat perhatian di setiap suasana." 
            },
            { 
                id: 5, 
                name: "Premium Silk Scarf - Golden Batik", 
                price: 350000, 
                priceDisp: "Rp 350.000", 
                img: "https://images.unsplash.com/photo-1584030373081-f37b7bb4fa82?w=500&q=80",
                desc: "Syal sutra lembut dengan motif batik yang dikerjakan secara manual oleh pengrajin terbaik." 
            },
            { 
                id: 6, 
                name: "Heels High Class - Velvet Gold", 
                price: 2800000, 
                priceDisp: "Rp 2.800.000", 
                img: "https://images.unsplash.com/photo-1543163521-1bf539c55dd2?w=500&q=80",
                desc: "Sepatu hak tinggi dengan balutan kain beludru premium dan alas emas yang empuk digunakan." 
            }
        ];

        // --- LOGIKA UTAMA ---

        function initApp() {
            const container = document.getElementById('grid-container');
            container.innerHTML = rawProducts.map(p => `
                <div class="product-card" onclick="showDetail(${p.id})">
                    <div class="portrait-box">
                        <img src="${encodeURI(p.img)}" onerror="this.src='https://via.placeholder.com/300x400?text=Ratu+Store'">
                    </div>
                    <div class="p-2">
                        <p class="text-[11px] text-gray-700 font-medium line-clamp-2 leading-tight h-8">${p.name}</p>
                        <div class="mt-2 flex flex-col">
                            <span class="text-red-500 font-bold text-sm">${p.priceDisp}</span>
                            <div class="flex items-center gap-1 mt-1">
                                <span class="bg-orange-50 text-[8px] text-orange-600 px-1 border border-orange-200">Star+</span>
                                <span class="text-[9px] text-gray-400">1rb+ Terjual</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function showDetail(id) {
            activeProduct = rawProducts.find(p => p.id === id);
            document.getElementById('det-img').src = encodeURI(activeProduct.img);
            document.getElementById('det-name').innerText = activeProduct.name;
            document.getElementById('det-price').innerText = activeProduct.priceDisp;
            document.getElementById('det-desc').innerText = activeProduct.desc;
            
            document.getElementById('modal-detail').classList.add('modal-active');
            
            // Play Audio
            const sound = document.getElementById('ratu-audio');
            sound.play().catch(() => console.log("User must interact first"));
        }

        function closeM(id) {
            document.getElementById(id).classList.remove('modal-active');
        }

        function goToCheckout() {
            closeM('modal-detail');
            document.getElementById('modal-checkout').classList.add('modal-active');
        }

        function finishToWA() {
            const prov = document.getElementById('in-prov').value;
            const kota = document.getElementById('in-kota').value;
            const desa = document.getElementById('in-desa').value;
            const rt = document.getElementById('in-rt').value;
            const rumah = document.getElementById('in-rumah').value;
            const pay = document.getElementById('in-pay').value;

            if(!prov || !kota || !desa) {
                alert("Ratu, mohon lengkapi alamat kirimnya dulu ya! 👑");
                return;
            }

            const formatMsg = `Halo Ratu Collection! ✨\n\nSAYA MAU PESAN PRODUK INI:\n👑 *${activeProduct.name}*\n💰 Harga: ${activeProduct.priceDisp}\n\n📍 *DATA PENGIRIMAN:*\nProvinsi: ${prov}\nKota: ${kota}\nDesa: ${desa}\nRT/RW: ${rt}\nNo. Rumah: ${rumah}\n\n💳 *PEMBAYARAN:* ${pay}\n\nMohon segera diproses ya! 🙏`;
            
            window.open(`https://wa.me/${adminWA}?text=${encodeURIComponent(formatMsg)}`);
        }

        // Admin Logics
        function showAdmin() {
            if(prompt("🛡️ Password Admin:") === "ratu") {
                document.getElementById('admin-panel').style.display = 'block';
            }
        }
        function hideAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        function saveAdmin() {
            const newWA = document.getElementById('adm-wa').value;
            if(newWA) { adminWA = newWA; alert("Target WA Berhasil Diubah!"); hideAdmin(); }
        }

        // Start App
        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
