<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RATU COLLECTION | Official Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --shopee-orange: #ee4d2d; 
            --shopee-bg: #f5f5f5;
            --gold-premium: #D4AF37;
            --text-main: #222;
            --text-secondary: #757575;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body { 
            background-color: var(--shopee-bg); 
            font-family: 'Roboto', sans-serif;
            margin: 0; padding-bottom: 70px; color: var(--text-main);
            overflow-x: hidden;
        }

        /* --- SKELETON & INTRO --- */
        #intro-screen {
            position: fixed; inset: 0; background: #fff; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            animation: fadeOut 0.8s ease 3s forwards;
        }
        .shopee-logo-intro {
            width: 80px; height: 80px; background: var(--shopee-orange);
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px rgba(238, 77, 45, 0.3);
        }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* --- HEADER SYSTEM --- */
        .main-header {
            background: linear-gradient(to bottom, #f53d2d, #f63);
            position: sticky; top: 0; z-index: 5000; padding: 8px 12px;
            transition: 0.3s;
        }
        .search-box {
            background: #fff; height: 34px; border-radius: 2px;
            display: flex; align-items: center; padding: 0 10px; flex: 1;
        }

        /* --- PRODUCT GRID (SMALL STYLE) --- */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px; padding: 6px;
        }
        .product-item {
            background: #fff; border-radius: 2px; overflow: hidden;
            display: flex; flex-direction: column;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            position: relative; text-decoration: none;
        }
        .product-item:active { background: #f9f9f9; }

        /* PORTRAIT RATIO 3:4 (Kecil & Rapi) */
        .image-wrapper {
            position: relative; width: 100%; padding-top: 125%; /* Ratio Portrait */
            background: #fdfdfd; overflow: hidden;
        }
        .image-wrapper img {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover;
        }

        .product-info { padding: 8px; flex-grow: 1; display: flex; flex-direction: column; }
        .product-title {
            font-size: 12px; line-height: 14px; height: 28px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; color: #212121; margin-bottom: 8px;
        }
        .price-row { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
        .product-price { color: var(--shopee-orange); font-size: 14px; font-weight: 500; }
        .sold-count { font-size: 10px; color: rgba(0,0,0,0.54); }

        /* --- TAGS & BADGES --- */
        .mall-badge {
            background: #d0011b; color: #fff; font-size: 8px;
            padding: 1px 3px; border-radius: 1px; font-weight: bold;
            margin-right: 4px; vertical-align: middle;
        }
        .free-shipping-icon { width: 18px; height: 12px; vertical-align: middle; }

        /* --- MODAL SYSTEM --- */
        .modal-mask {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            z-index: 9999; display: none; align-items: flex-end;
            backdrop-filter: blur(4px);
        }
        .modal-container {
            background: #fff; width: 100%; max-height: 90vh;
            border-radius: 16px 16px 0 0; transform: translateY(100%);
            transition: transform 0.3s ease-out; position: relative;
        }
        .modal-active { display: flex; }
        .modal-active .modal-container { transform: translateY(0); }

        .btn-primary {
            background: var(--shopee-orange); color: #fff;
            width: 100%; padding: 12px; font-weight: 500;
            text-align: center; border-radius: 4px; border: none;
        }

        /* --- FOOTER NAV --- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #fff; display: flex; justify-content: space-around;
            padding: 6px 0; border-top: 1px solid #e0e0e0; z-index: 6000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #666; font-size: 10px; flex: 1; }
        .nav-item.active { color: var(--shopee-orange); }
        .nav-item i { font-size: 20px; margin-bottom: 2px; }

        /* Custom Scroll */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="shopee-logo-intro">
            <i class="fas fa-shopping-bag text-white text-4xl"></i>
        </div>
        <div class="mt-4 text-[#ee4d2d] font-bold tracking-widest text-sm">RATU COLLECTION</div>
        <div class="absolute bottom-10 flex items-center gap-2">
            <img src="https://deo.shopeemobile.com/shopee/shopee-pcmall-live-sg/assets/ca5a12d1a3295d9c537123ef6a78299c.png" width="20">
            <span class="text-gray-400 text-[10px]">Go Internasional</span>
        </div>
    </div>

    <header class="main-header flex items-center gap-3">
        <div class="search-box">
            <i class="fas fa-search text-gray-400 text-sm mr-2"></i>
            <input type="text" placeholder="Baju Ratu Murah..." class="w-full text-xs outline-none bg-transparent">
        </div>
        <div class="flex gap-4 text-white text-xl">
            <div class="relative" onclick="showPopup('Fitur Chat akan segera hadir!')">
                <i class="far fa-comment-dots"></i>
                <span class="absolute -top-1 -right-1 bg-white text-red-500 text-[8px] px-1 rounded-full font-bold">1</span>
            </div>
            <div class="relative" onclick="showPopup('Keranjang Belanja Kosong')">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-dot" class="absolute -top-1 -right-1 bg-white text-red-500 text-[8px] px-1 rounded-full font-bold">0</span>
            </div>
        </div>
    </header>

    <div class="bg-white p-3 grid grid-cols-5 gap-2 text-center border-b mb-2">
        <div onclick="showPopup('Klaim Voucher Berhasil!')" class="flex flex-col items-center">
            <div class="w-9 h-9 bg-red-100 rounded-xl flex items-center justify-center text-red-500 mb-1"><i class="fas fa-ticket-alt"></i></div>
            <span class="text-[9px]">Voucher</span>
        </div>
        <div onclick="showPopup('Dapatkan Koin Setiap Hari!')" class="flex flex-col items-center">
            <div class="w-9 h-9 bg-yellow-100 rounded-xl flex items-center justify-center text-yellow-500 mb-1"><i class="fas fa-coins"></i></div>
            <span class="text-[9px]">Koin Saya</span>
        </div>
        <div onclick="location.reload()" class="flex flex-col items-center">
            <div class="w-9 h-9 bg-blue-100 rounded-xl flex items-center justify-center text-blue-500 mb-1"><i class="fas fa-sync-alt"></i></div>
            <span class="text-[9px]">Update</span>
        </div>
        <div onclick="showPopup('Gratis Ongkir Min. Belanja Rp0')" class="flex flex-col items-center">
            <div class="w-9 h-9 bg-green-100 rounded-xl flex items-center justify-center text-green-500 mb-1"><i class="fas fa-truck"></i></div>
            <span class="text-[9px]">Free Ongkir</span>
        </div>
        <div onclick="showPopup('Selamat Datang Ratu!')" class="flex flex-col items-center">
            <div class="w-9 h-9 bg-purple-100 rounded-xl flex items-center justify-center text-purple-500 mb-1"><i class="fas fa-star"></i></div>
            <span class="text-[9px]">Ratu Mall</span>
        </div>
    </div>

    <div class="bg-white p-3 mb-2">
        <div class="flex justify-between items-center mb-2">
            <div class="flex items-center gap-2">
                <h2 class="text-orange-600 font-bold italic tracking-tighter">FLASH SALE</h2>
                <div id="countdown" class="flex gap-1 text-white font-bold text-[10px]">
                    <span class="bg-black px-1 rounded">01</span>:
                    <span class="bg-black px-1 rounded">24</span>:
                    <span class="bg-black px-1 rounded">59</span>
                </div>
            </div>
            <span class="text-[10px] text-gray-400">Lihat Semua ></span>
        </div>
    </div>

    <div class="flex items-center gap-2 px-3 mb-2">
        <div class="w-1 h-4 bg-red-500"></div>
        <h2 class="text-xs font-bold text-gray-700 uppercase">Rekomendasi Ratu</h2>
    </div>

    <div id="product-container" class="product-grid">
        </div>

    <div id="modal-detail" class="modal-mask" onclick="closeModal('modal-detail')">
        <div class="modal-container" onclick="event.stopPropagation()">
            <div class="p-4 flex gap-4 border-b relative">
                <div class="w-24 h-32 rounded border overflow-hidden">
                    <img id="m-img" src="" class="w-full h-full object-cover">
                </div>
                <div class="flex-1 pt-2">
                    <p id="m-price" class="text-xl font-bold text-red-600"></p>
                    <p class="text-[10px] text-gray-400 mt-1">Stok: 1.294</p>
                    <div class="flex gap-2 mt-4">
                        <span class="bg-orange-50 text-orange-600 text-[9px] border border-orange-200 px-1">Mall</span>
                        <span class="bg-blue-50 text-blue-600 text-[9px] border border-blue-200 px-1">Garansi Ori</span>
                    </div>
                </div>
                <button onclick="closeModal('modal-detail')" class="absolute top-4 right-4 text-gray-400 text-2xl">&times;</button>
            </div>
            <div class="p-4 bg-gray-50 min-h-[150px]">
                <h3 id="m-name" class="font-bold text-gray-800 text-sm mb-3"></h3>
                <p id="m-desc" class="text-xs text-gray-500 leading-relaxed"></p>
            </div>
            <div class="p-4 flex gap-2">
                <button onclick="showPopup('Ditambahkan ke Keranjang')" class="flex-1 border-2 border-orange-600 text-orange-600 p-3 rounded font-bold text-xs uppercase">Beli Sekarang</button>
                <button onclick="openCheckout()" class="flex-1 bg-orange-600 text-white p-3 rounded font-bold text-xs uppercase shadow-lg">Checkout</button>
            </div>
        </div>
    </div>

    <div id="modal-checkout" class="modal-mask" onclick="closeModal('modal-checkout')">
        <div class="modal-container p-5" onclick="event.stopPropagation()">
            <h3 class="font-bold border-b pb-3 mb-4 flex items-center gap-2">
                <i class="fas fa-shipping-fast text-red-500"></i> Informasi Pengiriman
            </h3>
            <div class="space-y-3">
                <input type="text" id="c-prov" placeholder="Provinsi" class="w-full border p-3 rounded text-sm outline-none focus:border-red-500">
                <input type="text" id="c-kota" placeholder="Kota / Kabupaten" class="w-full border p-3 rounded text-sm outline-none">
                <input type="text" id="c-desa" placeholder="Desa / Kelurahan" class="w-full border p-3 rounded text-sm outline-none">
                <div class="flex gap-2">
                    <input type="text" id="c-rt" placeholder="RT/RW" class="w-full border p-3 rounded text-sm">
                    <input type="text" id="c-no" placeholder="No. Rumah" class="w-full border p-3 rounded text-sm">
                </div>
                <select id="c-pay" class="w-full border p-3 rounded text-sm bg-gray-50 font-bold">
                    <option value="Transfer BCA">Bank Transfer (BCA)</option>
                    <option value="DANA / OVO">E-Wallet (Dana/OVO)</option>
                    <option value="COD">COD - Bayar di Tempat</option>
                </select>
            </div>
            <button onclick="sendOrder()" class="btn-primary mt-6 bg-black">KIRIM KE WHATSAPP ADMIN</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active">
            <i class="fas fa-home"></i>
            <span>Beranda</span>
        </div>
        <div class="nav-item" onclick="showPopup('Live Ratu segera hadir!')">
            <i class="fas fa-video"></i>
            <span>Live</span>
        </div>
        <div class="nav-item" onclick="showPopup('Cek Video Produk Terbaru')">
            <i class="fas fa-play-circle"></i>
            <span>Video</span>
        </div>
        <div class="nav-item" onclick="showPopup('Menu Notifikasi')">
            <i class="far fa-bell"></i>
            <span>Notifikasi</span>
        </div>
        <div class="nav-item" onclick="showAdmin()">
            <i class="far fa-user"></i>
            <span>Saya</span>
        </div>
    </nav>

    <audio id="ratu-bgm" src="trtasfiq-sad-piano-instrumental-background-music-279069 (1).mp3" loop></audio>

    <script>
        // --- DATABASE PRODUK (6 PRODUK) ---
        const collection = [
            { 
                id: 1, 
                title: "Wong Urip Premium - Exclusive Edition 2026", 
                price: 0, 
                pLabel: "Hubungi Admin", 
                img: encodeURI("foto-1 2026-03-19 at 13.40.41.jpeg"),
                desc: "Koleksi paling dicari dengan sentuhan kain premium yang memberikan kemewahan maksimal bagi setiap Ratu." 
            },
            { 
                id: 2, 
                title: "Mba Simbet Dress Luxury - Sutra Putih Pearl", 
                price: 0, 
                pLabel: "Limited Stock", 
                img: encodeURI("WhatsApp Image 2026-03-19 at 13.40.16.jpeg"),
                desc: "Gaun sutra eksklusif yang dirancang oleh desainer internal Ratu Collection untuk acara spesial Anda." 
            },
            { 
                id: 3, 
                title: "Tas Selempang Wanita Impor Gold Majesty", 
                price: 1250000, 
                pLabel: "Rp 1.250.000", 
                img: "https://images.unsplash.com/photo-1590874103328-eac38a683ce7?w=500",
                desc: "Tas impor dengan ornamen emas 24k simulasi. Mewah, kokoh, dan berkelas internasional." 
            },
            { 
                id: 4, 
                title: "Cincin Mahkota Berlian - Royal Crown Series", 
                price: 3450000, 
                pLabel: "Rp 3.450.000", 
                img: "https://images.unsplash.com/photo-1605100804763-247f66122bc8?w=500",
                desc: "Simbol kemewahan sejati. Cincin berlian simulasi dengan desain mahkota Ratu yang memikat hati." 
            },
            { 
                id: 5, 
                title: "Scarf Silk Mewah - Corak Golden Abstract", 
                price: 250000, 
                pLabel: "Rp 250.000", 
                img: "https://images.unsplash.com/photo-1584030373081-f37b7bb4fa82?w=500",
                desc: "Syal sutra lembut yang menambah pesona elegan di setiap penampilan Ratu." 
            },
            { 
                id: 6, 
                title: "Sepatu Heels Gold Diamond Luxury", 
                price: 1850000, 
                pLabel: "Rp 1.850.000", 
                img: "https://images.unsplash.com/photo-1543163521-1bf539c55dd2?w=500",
                desc: "Langkah kaki yang memancarkan aura sultan dengan heels bertahtakan permata simulasi." 
            }
        ];

        let selectedProduct = null;
        let adminPhone = "6285640056650";

        // --- RENDER FUNCTIONS ---
        function renderApp() {
            const grid = document.getElementById('product-container');
            grid.innerHTML = collection.map(p => `
                <div class="product-item" onclick="openDetail(${p.id})">
                    <div class="image-wrapper">
                        <img src="${p.img}" onerror="this.src='https://via.placeholder.com/300x400?text=Produk+Ratu'">
                    </div>
                    <div class="product-info">
                        <div class="product-title">
                            <span class="mall-badge">Mall</span>${p.title}
                        </div>
                        <div class="price-row">
                            <span class="product-price">${p.pLabel}</span>
                            <span class="sold-count">1rb+ Terjual</span>
                        </div>
                        <div class="mt-2 flex items-center">
                            <img src="https://deo.shopeemobile.com/shopee/shopee-pcmall-live-sg/assets/ca5a12d1a3295d9c537123ef6a78299c.png" class="free-shipping-icon">
                            <span class="text-[8px] text-green-500 ml-1">Gratis Ongkir</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // --- INTERACTION LOGIC ---
        function openDetail(id) {
            selectedProduct = collection.find(p => p.id === id);
            document.getElementById('m-img').src = selectedProduct.img;
            document.getElementById('m-name').innerText = selectedProduct.title;
            document.getElementById('m-price').innerText = selectedProduct.pLabel;
            document.getElementById('m-desc').innerText = selectedProduct.desc;
            
            document.getElementById('modal-detail').classList.add('modal-active');
            
            // Audio Trigger
            const bgm = document.getElementById('ratu-bgm');
            bgm.play().catch(() => {});
        }

        function openCheckout() {
            closeModal('modal-detail');
            document.getElementById('modal-checkout').classList.add('modal-active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('modal-active');
        }

        function showPopup(txt) {
            alert("👑 Ratu Notification:\n" + txt);
        }

        function sendOrder() {
            const prov = document.getElementById('c-prov').value;
            const kota = document.getElementById('c-kota').value;
            const desa = document.getElementById('c-desa').value;
            const rt = document.getElementById('c-rt').value;
            const rumah = document.getElementById('c-no').value;
            const pay = document.getElementById('c-pay').value;

            if(!prov || !kota || !desa) return alert("Mohon lengkapi alamat kirim Ratu!");

            const msg = `Halo Ratu Collection! ✨\n\nSAYA MAU ORDER:\n📦 *${selectedProduct.title}*\n💰 Harga: ${selectedProduct.pLabel}\n\n📍 *ALAMAT LENGKAP:*\nProv: ${prov}\nKota: ${kota}\nDesa: ${desa}\nRT/RW: ${rt}\nRumah: ${rumah}\n\n💳 *METODE:* ${pay}\n\nSegera hubungi saya ya! 👑`;
            window.open(`https://wa.me/${adminPhone}?text=${encodeURIComponent(msg)}`);
        }

        function showAdmin() {
            const pass = prompt("🔒 Masukkan Kode Rahasia Admin:");
            if(pass === "ratu") {
                const newWA = prompt("Masukkan Nomor WA Admin Baru (628...):", adminPhone);
                if(newWA) { adminPhone = newWA; alert("Nomor WA Berhasil Diupdate!"); }
            } else {
                alert("Akses Ditolak!");
            }
        }

        // Countdown Timer Logic
        setInterval(() => {
            const cd = document.getElementById('countdown');
            let h = Math.floor(Math.random() * 2);
            let m = Math.floor(Math.random() * 59);
            let s = Math.floor(Math.random() * 59);
            cd.innerHTML = `<span class="bg-black px-1 rounded">${h < 10 ? '0'+h : h}</span>:<span class="bg-black px-1 rounded">${m < 10 ? '0'+m : m}</span>:<span class="bg-black px-1 rounded">${s < 10 ? '0'+s : s}</span>`;
        }, 1000);

        window.onload = renderApp;
    </script>
</body>
</html>
