<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RATU COLLECTION | Absolute Empress 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root { --gold: #D4AF37; --royal-red: #ee4d2d; --dark: #000; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        
        body { background: #fdfdfd; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* --- VIDEO REELS SYSTEM (FIXED) --- */
        #video-reels-container {
            position: relative; width: 100%; height: 70vh; background: #000;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        .v-overlay {
            position: absolute; inset: 0; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 50%, rgba(0,0,0,0.8) 100%);
            z-index: 10; pointer-events: none;
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* --- REFRESH & REPAIR FLOATING --- */
        .system-tools {
            position: fixed; bottom: 100px; right: 20px; z-index: 99999;
            display: flex; flex-direction: column; gap: 15px;
        }
        .tool-btn {
            width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; color: white; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            cursor: pointer; border: 2px solid white; transition: 0.3s;
        }
        .btn-refresh { background: var(--gold); }
        .btn-video { background: #25d366; }

        /* --- PRODUCT GRID --- */
        .empress-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 15px; padding: 15px; max-width: 1200px; margin: 0 auto;
        }
        @media (min-width: 1024px) { .empress-grid { grid-template-columns: repeat(4, 1fr); gap: 30px; } }

        .card-ratu {
            background: white; border-radius: 20px; overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.4s;
            border: 1px solid #f0f0f0;
        }
        .card-ratu:hover { transform: translateY(-8px); }
        
        /* --- NAVIGATION --- */
        header {
            background: white; position: sticky; top: 0; z-index: 40000;
            padding: 15px 20px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #eee;
        }

        .side-drawer {
            position: fixed; top: 0; right: 0; bottom: 0; width: 100%; max-width: 450px;
            background: white; z-index: 100000; transform: translateX(100%);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .side-drawer.active { transform: translateX(0); box-shadow: -10px 0 50px rgba(0,0,0,0.1); }
        
        .overlay-mask {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            z-index: 80000; display: none; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    <header>
        <div class="flex items-center gap-3">
            <img src="Gemini_Generated_Image_gfusskgfusskgfus.png" class="w-10 h-10 rounded-full border border-gold shadow-sm">
            <h1 class="font-black italic text-lg tracking-tighter">RATU<span class="text-red-600">.COLLECTION</span></h1>
        </div>
        <div class="flex gap-5 text-xl text-gray-800">
            <div class="relative cursor-pointer" onclick="toggleDrawer('cart-drawer')">
                <i class="fas fa-shopping-bag"></i>
                <span id="cart-badge" class="absolute -top-2 -right-2 bg-red-600 text-white text-[9px] font-black px-1.5 rounded-full hidden">0</span>
            </div>
            <i class="fas fa-bars cursor-pointer" onclick="toggleDrawer('menu-drawer')"></i>
        </div>
    </header>

    <section id="video-reels-container">
        <div class="v-overlay"></div>
        <video id="main-video" loop muted playsinline autoplay poster="https://via.placeholder.com/800x1200?text=Ratu+Collection+Loading...">
            <source src="https://assets.mixkit.co/videos/preview/mixkit-fashion-model-walking-on-the-street-34446-large.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        
        <div class="absolute bottom-10 left-8 z-20 text-white animate__animated animate__fadeInLeft">
            <div class="flex items-center gap-2 mb-3">
                <span class="bg-red-600 px-3 py-1 rounded text-[10px] font-black tracking-widest uppercase">Live Now</span>
                <span class="text-xs font-bold shadow-sm">International Collection ✨</span>
            </div>
            <h2 class="text-3xl font-black tracking-tighter italic mb-5">Elegance In Every Step.</h2>
            <button onclick="scrollToProducts()" class="bg-white text-black font-black px-8 py-3 rounded-full text-[10px] uppercase tracking-widest shadow-xl">Lihat Koleksi</button>
        </div>
    </section>

    <div class="system-tools">
        <div class="tool-btn btn-video" onclick="forcePlayVideo()" title="Putar Video Paksa">
            <i class="fas fa-play"></i>
        </div>
        <div class="tool-btn btn-refresh" onclick="repairSystem()" title="Perbaiki Produk">
            <i class="fas fa-sync-alt"></i>
        </div>
    </div>

    <div id="overlay-mask" class="overlay-mask" onclick="closeAll()"></div>

    <main class="py-10 bg-[#f9f9f9]">
        <div class="px-5 mb-8 flex items-center justify-between">
            <h3 class="font-black text-xs uppercase tracking-[4px] text-gray-400">Signature Items</h3>
            <span class="text-[10px] font-bold text-red-500 animate-pulse">Update Hari Ini 👑</span>
        </div>

        <div id="product-container" class="empress-grid">
            </div>
    </main>

    <div id="cart-drawer" class="side-drawer">
        <div class="p-8 border-b flex justify-between items-center">
            <h3 class="font-black text-xl italic uppercase">Keranjang Saya</h3>
            <i class="fas fa-times text-2xl text-gray-300 cursor-pointer" onclick="closeAll()"></i>
        </div>
        <div id="cart-items" class="p-6 space-y-4 overflow-y-auto flex-1"></div>
        <div class="p-8 border-t">
            <div class="flex justify-between mb-8">
                <span class="font-bold text-gray-400 text-xs">TOTAL:</span>
                <span id="cart-total" class="font-black text-2xl text-red-600">Rp 0</span>
            </div>
            <button onclick="openCheckout()" class="w-full bg-black text-white py-5 font-black rounded-2xl tracking-[4px] uppercase text-xs">Checkout Sekarang</button>
        </div>
    </div>

    <div id="menu-drawer" class="side-drawer">
        <div class="p-8 border-b flex justify-between items-center">
            <h3 class="font-black text-xl italic uppercase">Menu Admin</h3>
            <i class="fas fa-times text-2xl text-gray-300 cursor-pointer" onclick="closeAll()"></i>
        </div>
        <div class="p-10 space-y-8">
            <button onclick="contactWA('Halo Admin Ratu...')" class="w-full bg-[#25d366] text-white py-4 rounded-xl font-black shadow-lg flex items-center justify-center gap-3">
                <i class="fab fa-whatsapp text-2xl"></i> WHATSAPP VIP
            </button>
            <div class="text-center opacity-30 mt-20">
                <p class="text-[10px] font-black tracking-widest">RATU COLLECTION V130.0</p>
                <p class="text-[8px] mt-2">Sovereign Edition 2026</p>
            </div>
        </div>
    </div>

    <div id="checkout-modal" class="overlay-mask" style="display:none; align-items: center; justify-content: center; z-index: 150000;" onclick="closeAll()">
        <div class="bg-white w-[90%] max-w-[500px] p-8 rounded-[30px] animate__animated animate__zoomIn animate__faster" onclick="event.stopPropagation()">
            <h3 class="text-2xl font-black mb-8 text-center italic">Formulir Pengiriman</h3>
            <div class="space-y-4">
                <input type="text" id="form-nama" placeholder="Nama Lengkap" class="w-full bg-gray-50 p-4 rounded-xl outline-none border focus:border-red-500 font-bold">
                <textarea id="form-alamat" placeholder="Alamat Lengkap" class="w-full bg-gray-50 p-4 rounded-xl outline-none border h-24 focus:border-red-500 font-bold"></textarea>
            </div>
            <button onclick="sendToWA()" class="w-full bg-red-600 text-white py-5 font-black rounded-xl mt-8 shadow-xl">Kirim Pesanan (WA)</button>
        </div>
    </div>

    <script>
        // --- DATA PRODUK (HARD-CODED UNTUK STABILITAS) ---
        const products = [
            { id: 1, name: "Wong Urip Signature - Royal Black 2026", label: "Exclusive Item", price: 0, img: "foto-1 2026-03-19 at 13.40.41.jpeg" },
            { id: 2, name: "Mba Simbet Elegance - Pearl White Silk", label: "Premium Edition", price: 0, img: "WhatsApp Image 2026-03-19 at 13.40.16.jpeg" },
            { id: 3, name: "Gold Majesty Crown Handbag - International", label: "Rp 1.850.000", price: 1850000, img: "https://images.unsplash.com/photo-1590874103328-eac38a683ce7?w=600" },
            { id: 4, name: "Royal Diamond Crown Ring - High Quality", label: "Rp 3.200.000", price: 3200000, img: "https://images.unsplash.com/photo-1605100804763-247f66122bc8?w=600" }
        ];

        let cart = [];
        const waNumber = "6285640056650";

        // --- VIDEO SYSTEM REPAIR ---
        function forcePlayVideo() {
            const v = document.getElementById('main-video');
            v.muted = true; // Wajib agar autoplay jalan
            v.play().then(() => {
                alert("▶️ Video Ratu Berhasil Diputar!");
            }).catch(err => {
                console.log("Video diblokir browser: ", err);
                alert("Mohon sentuh layar lagi untuk mengizinkan video.");
            });
        }

        // --- PRODUCT SYSTEM REPAIR ---
        function renderProducts() {
            const container = document.getElementById('product-container');
            if(!container) return;

            container.innerHTML = products.map(p => `
                <div class="card-ratu animate__animated animate__fadeInUp">
                    <div class="relative w-full pt-[135%] bg-gray-100 overflow-hidden">
                        <img src="${encodeURI(p.img)}" class="absolute inset-0 w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400x540?text=Produk+Ratu'">
                    </div>
                    <div class="p-4">
                        <h4 class="text-[10px] font-black text-gray-800 uppercase line-clamp-2 h-8 leading-tight">${p.name}</h4>
                        <p class="text-red-600 font-black text-sm mt-2">${p.label}</p>
                        <button onclick="addToCart(${p.id})" class="w-full mt-4 py-2 border-2 border-black text-[9px] font-black uppercase rounded-lg hover:bg-black hover:text-white transition">Tambah</button>
                    </div>
                </div>
            `).join('');
        }

        function repairSystem() {
            renderProducts();
            alert("✨ Produk Ratu Berhasil Diperbarui!");
        }

        // --- DRAWER & UI ---
        function toggleDrawer(id) {
            document.getElementById(id).classList.add('active');
            document.getElementById('overlay-mask').style.display = 'block';
            if(id === 'cart-drawer') updateCartUI();
        }

        function closeAll() {
            document.querySelectorAll('.side-drawer').forEach(d => d.classList.remove('active'));
            document.getElementById('overlay-mask').style.display = 'none';
            document.getElementById('checkout-modal').style.display = 'none';
        }

        function scrollToProducts() {
            window.scrollTo({ top: window.innerHeight * 0.7, behavior: 'smooth' });
        }

        // --- CART LOGIC ---
        function addToCart(id) {
            const p = products.find(x => x.id === id);
            const exist = cart.find(c => c.id === id);
            if(exist) exist.qty++; else cart.push({...p, qty: 1});
            
            updateBadge();
            alert("Berhasil ditambah ke Keranjang! 👑");
        }

        function updateBadge() {
            const b = document.getElementById('cart-badge');
            const total = cart.reduce((a, b) => a + b.qty, 0);
            if(total > 0) { b.innerText = total; b.classList.remove('hidden'); }
            else b.classList.add('hidden');
        }

        function updateCartUI() {
            const list = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            let sum = 0;

            if(cart.length === 0) {
                list.innerHTML = `<div class="text-center py-20 opacity-20 font-black uppercase text-xs">Kosong</div>`;
                totalEl.innerText = "Rp 0";
                return;
            }

            list.innerHTML = cart.map(i => {
                sum += (i.price * i.qty);
                return `
                <div class="flex gap-4 border-b pb-4">
                    <img src="${encodeURI(i.img)}" class="w-16 h-20 object-cover rounded-lg">
                    <div class="flex-1">
                        <h5 class="text-[10px] font-black uppercase text-gray-500">${i.name}</h5>
                        <p class="text-red-600 font-black text-xs mt-1">${i.label}</p>
                        <div class="flex items-center gap-3 mt-3">
                            <button onclick="changeQty(${i.id}, -1)" class="w-6 h-6 border rounded font-bold">-</button>
                            <span class="text-xs font-bold">${i.qty}</span>
                            <button onclick="changeQty(${i.id}, 1)" class="w-6 h-6 border rounded font-bold">+</button>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
            totalEl.innerText = sum > 0 ? "Rp " + sum.toLocaleString('id-ID') : "Tanya Admin";
        }

        function changeQty(id, d) {
            const i = cart.find(x => x.id === id);
            i.qty += d;
            if(i.qty < 1) cart = cart.filter(x => x.id !== id);
            updateCartUI(); updateBadge();
        }

        // --- CHECKOUT ---
        function openCheckout() {
            if(cart.length === 0) return;
            closeAll();
            document.getElementById('checkout-modal').style.display = 'flex';
        }

        function sendToWA() {
            const nama = document.getElementById('form-nama').value;
            const alamat = document.getElementById('form-alamat').value;
            if(!nama || !alamat) return alert("Isi data dulu Ratu!");

            const barang = cart.map(i => `- ${i.name} (${i.qty}x)`).join('\n');
            const msg = `Halo Admin Ratu Collection! ✨\n\nSAYA PESAN:\n${barang}\n\n📍 ALAMAT: ${alamat}\n👤 NAMA: ${nama}\n\nTerima kasih! 👑`;
            window.open(`https://wa.me/${waNumber}?text=${encodeURIComponent(msg)}`);
        }

        function contactWA(t) { window.open(`https://wa.me/${waNumber}?text=${encodeURIComponent(t)}`); }

        // AUTO-INIT
        window.addEventListener('load', () => {
            renderProducts();
            // Coba putar video 1 detik setelah halaman siap
            setTimeout(forcePlayVideo, 1000);
        });
    </script>
</body>
</html>
