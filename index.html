<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RATU COLLECTION | Official Store</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root { 
            --shopee-orange: #ee4d2d; 
            --bg-gray: #f5f5f5;
            --white: #ffffff;
            --gold: #D4AF37;
        }

        /* RESET & BASE */
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg-gray); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #222; padding-bottom: 80px;
        }

        /* --- STICKY HEADER --- */
        .header-main {
            background: linear-gradient(180deg, #f53d2d, #ff6633);
            position: sticky; top: 0; z-index: 5000; padding: 10px 12px;
            display: flex; align-items: center; gap: 10px;
        }
        .search-bar {
            background: var(--white); flex: 1; height: 36px;
            border-radius: 2px; display: flex; align-items: center; padding: 0 10px;
        }

        /* --- PORTRAIT GRID SYSTEM (3:4) --- */
        .product-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 8px; padding: 8px; max-width: 1000px; margin: 0 auto;
        }
        .product-card {
            background: var(--white); border-radius: 2px; overflow: hidden;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative;
            transition: transform 0.1s;
        }
        .product-card:active { transform: scale(0.98); }

        .image-box {
            position: relative; width: 100%; padding-top: 133.33%; /* Rasio Potret 3:4 */
            background: #f0f0f0; overflow: hidden;
        }
        .image-box img {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover;
            display: block;
        }

        /* --- SHOPPING CART DRAWER --- */
        #cart-panel {
            position: fixed; top: 0; right: 0; bottom: 0; width: 100%; max-width: 450px;
            background: var(--white); z-index: 9999; transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; box-shadow: -5px 0 15px rgba(0,0,0,0.1);
        }
        #cart-panel.open { transform: translateX(0); }
        .cart-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            z-index: 9998; display: none; backdrop-filter: blur(2px);
        }

        /* --- MODAL SYSTEM --- */
        .modal-mask {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            z-index: 8000; display: none; align-items: flex-end;
            justify-content: center;
        }
        .modal-box {
            background: var(--white); width: 100%; max-width: 500px;
            border-radius: 15px 15px 0 0; transform: translateY(100%);
            transition: transform 0.3s ease; max-height: 90vh; overflow-y: auto;
        }
        .modal-mask.show { display: flex; }
        .modal-mask.show .modal-box { transform: translateY(0); }

        /* --- UI COMPONENTS --- */
        .badge-mall { background: #d0011b; color: #fff; font-size: 8px; padding: 1px 3px; font-weight: bold; border-radius: 1px; margin-right: 4px; }
        .btn-buy { background: var(--shopee-orange); color: #fff; width: 100%; padding: 14px; font-weight: bold; text-transform: uppercase; border-radius: 4px; }
        .btn-add-cart { border: 1px solid var(--shopee-orange); color: var(--shopee-orange); width: 100%; padding: 14px; font-weight: bold; text-transform: uppercase; border-radius: 4px; }

        /* --- UTILS --- */
        .clamp-text { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .no-scroll { overflow: hidden; }
    </style>
</head>
<body>

    <div id="cart-overlay" class="cart-overlay" onclick="toggleCart(false)"></div>

    <header class="header-main">
        <div class="w-10 h-10 bg-white rounded-full overflow-hidden border-2 border-white shadow-sm">
            <img id="logo-header" src="Gemini_Generated_Image_gfusskgfusskgfus.png" class="w-full h-full object-cover">
        </div>
        <div class="search-bar">
            <i class="fas fa-search text-gray-400 text-sm mr-2"></i>
            <input type="text" placeholder="Cari produk elegan..." class="w-full text-xs outline-none">
        </div>
        <div class="relative cursor-pointer px-2" onclick="toggleCart(true)">
            <i class="fas fa-shopping-cart text-white text-xl"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-white text-red-600 text-[10px] font-bold px-1.5 rounded-full border border-red-500 hidden">0</span>
        </div>
    </header>

    <div class="bg-white p-4 grid grid-cols-4 gap-2 text-center border-b mb-2">
        <div onclick="alert('Voucher Ratu Berhasil Diklaim!')" class="flex flex-col items-center">
            <div class="w-10 h-10 bg-orange-100 rounded-2xl flex items-center justify-center text-orange-600 mb-1"><i class="fas fa-ticket-alt text-lg"></i></div>
            <span class="text-[10px]">Voucher</span>
        </div>
        <div onclick="alert('Koin Anda: 10.000')" class="flex flex-col items-center">
            <div class="w-10 h-10 bg-yellow-100 rounded-2xl flex items-center justify-center text-yellow-600 mb-1"><i class="fas fa-coins text-lg"></i></div>
            <span class="text-[10px]">Koin</span>
        </div>
        <div onclick="alert('Gratis Ongkir Aktif')" class="flex flex-col items-center">
            <div class="w-10 h-10 bg-green-100 rounded-2xl flex items-center justify-center text-green-600 mb-1"><i class="fas fa-truck text-lg"></i></div>
            <span class="text-[10px]">Free Ongkir</span>
        </div>
        <div onclick="location.reload()" class="flex flex-col items-center">
            <div class="w-10 h-10 bg-blue-100 rounded-2xl flex items-center justify-center text-blue-600 mb-1"><i class="fas fa-sync text-lg"></i></div>
            <span class="text-[10px]">Refresh</span>
        </div>
    </div>

    <main>
        <div class="flex items-center gap-2 px-4 py-2 bg-white mb-0.5">
            <div class="w-1 h-4 bg-red-600"></div>
            <h2 class="text-xs font-bold text-gray-800 uppercase tracking-widest">Koleksi Terlaris</h2>
        </div>
        <div id="product-container" class="product-grid">
            </div>
    </main>

    <div id="cart-panel">
        <div class="p-4 border-b flex items-center justify-between bg-white sticky top-0">
            <h3 class="font-bold text-lg"><i class="fas fa-shopping-basket mr-2 text-orange-600"></i>Keranjang Saya</h3>
            <button onclick="toggleCart(false)" class="text-2xl text-gray-400">&times;</button>
        </div>
        <div id="cart-list" class="flex-1 overflow-y-auto p-4 bg-gray-50">
            </div>
        <div class="p-5 border-t bg-white shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <span class="text-gray-500">Subtotal Belanja:</span>
                <span id="cart-total-price" class="text-xl font-bold text-orange-600">Rp 0</span>
            </div>
            <button onclick="openCheckout()" class="btn-buy py-4 shadow-lg">Checkout Sekarang</button>
        </div>
    </div>

    <div id="modal-detail" class="modal-mask" onclick="closeModal('modal-detail')">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="relative">
                <div class="w-full h-[400px] bg-gray-100">
                    <img id="m-img" src="" class="w-full h-full object-cover">
                </div>
                <button onclick="closeModal('modal-detail')" class="absolute top-4 right-4 bg-black/30 text-white w-8 h-8 rounded-full">&times;</button>
            </div>
            <div class="p-5">
                <p id="m-price" class="text-2xl font-bold text-red-600 mb-1"></p>
                <h3 id="m-name" class="font-bold text-lg text-gray-800 leading-tight mb-4"></h3>
                <div class="bg-gray-50 p-4 rounded-lg border border-dashed border-gray-300">
                    <p class="text-[10px] text-gray-400 font-bold uppercase mb-2">Deskripsi Produk</p>
                    <p id="m-desc" class="text-xs text-gray-600 leading-relaxed"></p>
                </div>
            </div>
            <div class="p-4 grid grid-cols-2 gap-3 border-t">
                <button onclick="addToCart()" class="btn-add-cart text-xs">Tambah Keranjang</button>
                <button onclick="buyNow()" class="btn-buy text-xs">Beli Sekarang</button>
            </div>
        </div>
    </div>

    <div id="modal-checkout" class="modal-mask" onclick="closeModal('modal-checkout')">
        <div class="modal-box p-6" onclick="event.stopPropagation()">
            <h3 class="font-bold text-xl mb-6 flex items-center gap-2 border-b pb-3">
                <i class="fas fa-truck-loading text-red-500"></i> Detail Pengiriman
            </h3>
            <div class="space-y-4">
                <input type="text" id="c-name" placeholder="Nama Lengkap Ratu" class="w-full border p-3 rounded-lg outline-none focus:border-red-500">
                <input type="text" id="c-addr" placeholder="Alamat Lengkap (Prov/Kota/Desa/No Rumah)" class="w-full border p-3 rounded-lg outline-none">
                <select id="c-pay" class="w-full border p-3 rounded-lg bg-gray-50 font-bold">
                    <option value="Transfer Bank BCA">Bank Transfer (BCA)</option>
                    <option value="E-Wallet (Dana/SPay)">E-Wallet (Dana/ShopeePay)</option>
                    <option value="COD (Bayar di Tempat)">COD (Bayar di Tempat)</option>
                </select>
            </div>
            <button onclick="checkoutToWA()" class="btn-buy mt-8 bg-black">Konfirmasi & Kirim Pesanan</button>
        </div>
    </div>

    <nav class="fixed bottom-0 inset-x-0 bg-white border-t flex justify-around py-3 z-[4000] shadow-xl">
        <div class="text-orange-600 text-center flex flex-col items-center">
            <i class="fas fa-home text-xl"></i><span class="text-[10px] mt-1">Beranda</span>
        </div>
        <div class="text-gray-400 text-center flex flex-col items-center" onclick="alert('Belum ada video')">
            <i class="fas fa-play-circle text-xl"></i><span class="text-[10px] mt-1">Video</span>
        </div>
        <div class="text-gray-400 text-center flex flex-col items-center" onclick="alert('Pesan Kosong')">
            <i class="far fa-comment-dots text-xl"></i><span class="text-[10px] mt-1">Chat</span>
        </div>
        <div class="text-gray-400 text-center flex flex-col items-center" onclick="showAdmin()">
            <i class="far fa-user text-xl"></i><span class="text-[10px] mt-1">Saya</span>
        </div>
    </nav>

    <audio id="ratu-bgm" src="trtasfiq-sad-piano-instrumental-background-music-279069 (1).mp3" loop></audio>

    <script>
        // --- DATA & CONFIG ---
        let adminPhone = "6285640056650";
        let cart = [];
        let activeProduct = null;

        // Daftar Produk dengan Link Gambar yang sudah dibersihkan untuk Laptop
        const database = [
            {
                id: 1,
                name: "Wong Urip Signature - Royal Black Edition",
                price: 0,
                priceDisp: "Hubungi Admin",
                img: "foto-1%202026-03-19%20at%2013.40.41.jpeg", // Menggunakan format %20 untuk spasi
                desc: "Koleksi paling eksklusif dari Ratu Collection. Bahan kain premium dengan sentuhan magis."
            },
            {
                id: 2,
                name: "Mba Simbet Elegance - Pearl White Silk",
                price: 0,
                priceDisp: "Limited Stock",
                img: "WhatsApp%20Image%202026-03-19%20at%2013.40.16.jpeg",
                desc: "Gaun sutra premium yang dirancang khusus untuk memancarkan aura kemewahan Ratu."
            },
            {
                id: 3,
                name: "International Gold Crown Handbag",
                price: 1350000,
                priceDisp: "Rp 1.350.000",
                img: "https://images.unsplash.com/photo-1590874103328-eac38a683ce7?w=600",
                desc: "Tas impor kualitas tinggi dengan ornamen emas murni di bagian logo."
            },
            {
                id: 4,
                name: "Royal Diamond Wedding Ring 24K",
                price: 4500000,
                priceDisp: "Rp 4.500.000",
                img: "https://images.unsplash.com/photo-1605100804763-247f66122bc8?w=600",
                desc: "Perhiasan mahakarya dengan taburan berlian simulasi kualitas internasional."
            },
            {
                id: 5,
                name: "Premium Silk Scarf - Golden Batik",
                price: 450000,
                priceDisp: "Rp 450.000",
                img: "https://images.unsplash.com/photo-1584030373081-f37b7bb4fa82?w=600",
                desc: "Syal sutra lembut yang menambah pesona elegan di setiap penampilan."
            },
            {
                id: 6,
                name: "Royal Heels - Velvet Gold Luxury",
                price: 2100000,
                priceDisp: "Rp 2.100.000",
                img: "https://images.unsplash.com/photo-1543163521-1bf539c55dd2?w=600",
                desc: "Sepatu hak tinggi bertahtakan permata untuk langkah yang memukau."
            }
        ];

        // --- CORE LOGIC ---

        function init() {
            const container = document.getElementById('product-container');
            container.innerHTML = database.map(p => `
                <div class="product-card" onclick="openDetail(${p.id})">
                    <div class="image-box">
                        <span class="badge-mall absolute top-0 left-0 z-10">MALL</span>
                        <img src="${p.img}" onerror="this.src='https://via.placeholder.com/300x400?text=Produk+Ratu'">
                    </div>
                    <div class="p-2">
                        <p class="text-[11px] text-gray-700 clamp-text leading-tight h-8 font-medium">${p.name}</p>
                        <p class="text-orange-600 font-bold text-sm mt-2">${p.priceDisp}</p>
                        <div class="flex items-center gap-1 mt-1">
                            <span class="text-[8px] bg-red-50 text-red-500 border border-red-100 px-1">Terlaris</span>
                            <span class="text-[9px] text-gray-400">1rb+ terjual</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // CART SYSTEM
        function toggleCart(open) {
            const panel = document.getElementById('cart-panel');
            const overlay = document.getElementById('cart-overlay');
            if(open) {
                panel.classList.add('open');
                overlay.style.display = 'block';
                renderCart();
            } else {
                panel.classList.remove('open');
                overlay.style.display = 'none';
            }
        }

        function addToCart() {
            const existing = cart.find(i => i.id === activeProduct.id);
            if(existing) {
                existing.qty++;
            } else {
                cart.push({...activeProduct, qty: 1});
            }
            updateCartBadge();
            closeModal('modal-detail');
            alert("✨ Berhasil masuk keranjang Ratu!");
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            const totalEl = document.getElementById('cart-total-price');
            
            if(cart.length === 0) {
                list.innerHTML = `<div class="text-center mt-20 text-gray-300"><i class="fas fa-shopping-basket text-5xl mb-4"></i><br>Keranjang Ratu masih kosong</div>`;
                totalEl.innerText = "Rp 0";
                return;
            }

            let total = 0;
            list.innerHTML = cart.map(item => {
                total += (item.price * item.qty);
                return `
                    <div class="bg-white p-3 rounded-lg border mb-3 flex gap-3 shadow-sm">
                        <img src="${item.img}" class="w-16 h-20 object-cover rounded border shadow-inner">
                        <div class="flex-1">
                            <h4 class="text-xs font-bold text-gray-700 leading-tight">${item.name}</h4>
                            <p class="text-orange-600 font-bold text-xs mt-1">${item.priceDisp}</p>
                            <div class="flex items-center gap-4 mt-3">
                                <button onclick="updateQty(${item.id}, -1)" class="w-6 h-6 border rounded text-gray-400">-</button>
                                <span class="text-sm font-bold">${item.qty}</span>
                                <button onclick="updateQty(${item.id}, 1)" class="w-6 h-6 border rounded text-gray-400">+</button>
                                <button onclick="removeItem(${item.id})" class="ml-auto text-gray-300"><i class="far fa-trash-alt"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            totalEl.innerText = total > 0 ? "Rp " + total.toLocaleString('id-ID') : "Tanya Admin";
        }

        function updateQty(id, delta) {
            const item = cart.find(i => i.id === id);
            item.qty += delta;
            if(item.qty < 1) removeItem(id);
            renderCart();
            updateCartBadge();
        }

        function removeItem(id) {
            cart = cart.filter(i => i.id !== id);
            renderCart();
            updateCartBadge();
        }

        function updateCartBadge() {
            const badge = document.getElementById('cart-count');
            const total = cart.reduce((a, b) => a + b.qty, 0);
            if(total > 0) {
                badge.innerText = total;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        // MODAL SYSTEM
        function openDetail(id) {
            activeProduct = database.find(p => p.id === id);
            document.getElementById('m-img').src = activeProduct.img;
            document.getElementById('m-name').innerText = activeProduct.name;
            document.getElementById('m-price').innerText = activeProduct.priceDisp;
            document.getElementById('m-desc').innerText = activeProduct.desc;
            document.getElementById('modal-detail').classList.add('show');
            document.body.classList.add('no-scroll');
            
            const audio = document.getElementById('ratu-bgm');
            audio.play().catch(() => {});
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
            document.body.classList.remove('no-scroll');
        }

        function buyNow() {
            addToCart();
            toggleCart(true);
        }

        function openCheckout() {
            if(cart.length === 0) return alert("Keranjang masih kosong, Ratu!");
            toggleCart(false);
            document.getElementById('modal-checkout').classList.add('show');
        }

        // FINAL CHECKOUT
        function checkoutToWA() {
            const name = document.getElementById('c-name').value;
            const addr = document.getElementById('c-addr').value;
            const pay = document.getElementById('c-pay').value;

            if(!name || !addr) return alert("Lengkapi alamat dulu ya, Ratu!");

            const listStr = cart.map(i => `- ${i.name} (${i.qty}x)`).join('\n');
            const totalStr = document.getElementById('cart-total-price').innerText;

            const finalMsg = `Halo Ratu Collection! ✨\n\nSAYA MAU ORDER:\n${listStr}\n\n💰 *TOTAL:* ${totalStr}\n\n📍 *DATA PENERIMA:*\nNama: ${name}\nAlamat: ${addr}\n💳 Pembayaran: ${pay}\n\nMohon segera diproses ya! 👑`;
            
            window.open(`https://wa.me/${adminPhone}?text=${encodeURIComponent(finalMsg)}`);
        }

        function showAdmin() {
            const pass = prompt("Password Admin:");
            if(pass === "ratu") {
                const n = prompt("Ganti No WA (628...):", adminPhone);
                if(n) adminPhone = n;
            }
        }

        window.onload = init;
    </script>
</body>
</html>
