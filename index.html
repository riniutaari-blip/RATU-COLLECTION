<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RATU COLLECTION | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark: #0a0a0a; }
        body { background-color: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }

        /* --- CINEMATIC INTRO --- */
        #intro-overlay {
            position: fixed; inset: 0; background: black; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            animation: fadeOut 1s ease 4s forwards;
        }
        .cinematic-text {
            font-size: 2.5rem; font-weight: 900; letter-spacing: 10px; color: transparent;
            background: linear-gradient(90deg, #fff, var(--gold), #fff);
            background-size: 200% auto; -webkit-background-clip: text;
            animation: shine 3s linear infinite, zoomIn 4s ease-out forwards;
            text-transform: uppercase; text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            text-align: center;
        }
        @keyframes shine { to { background-position: 200% center; } }
        @keyframes zoomIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1.1); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* --- ELEGANT BLACK & GOLD DESIGN --- */
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .gold-text { color: var(--gold); }
        .btn-gold { background: linear-gradient(135deg, #D4AF37, #FBE106); color: black; font-weight: bold; }
        .product-card { transition: 0.3s; border-radius: 15px; overflow: hidden; }
        .product-card:hover { transform: translateY(-5px); border-color: var(--gold); }
        
        /* --- ADMIN PANEL HIDE & SHOW --- */
        #admin-btn { position: fixed; bottom: 20px; left: 20px; z-index: 100; opacity: 0.5; transition: 0.3s; }
        #admin-btn:hover { opacity: 1; transform: scale(1.1); }
        #admin-box { display: none; position: fixed; bottom: 80px; left: 20px; width: 280px; z-index: 101; padding: 15px; border-radius: 15px; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <h1 class="cinematic-text">RATU<br>COLLECTION</h1>
    </div>

    <nav class="p-5 flex justify-between items-center glass sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <img id="logo-img" src="https://via.placeholder.com/50/D4AF37/000000?text=👑" class="w-10 h-10 rounded-full border border-gold object-cover">
            <h1 class="text-lg font-bold tracking-tighter gold-text">RATU COLLECTION</h1>
        </div>
        <button onclick="checkOut()" class="relative transition active:scale-90">
            <i class="fas fa-shopping-cart text-xl hover:text-gold transition"></i>
            <span id="cart-count" class="absolute -top-2 -right-2 bg-red-600 text-[10px] px-1.5 rounded-full">0</span>
        </button>
    </nav>

    <div class="p-6 text-center mt-4">
        <h2 class="text-2xl font-light tracking-[5px] uppercase">Koleksi Mewah</h2>
        <div class="h-1 w-20 bg-gold mx-auto mt-2 rounded"></div>
    </div>

    <div id="product-list" class="grid grid-cols-2 gap-4 p-4 max-w-4xl mx-auto">
        </div>

    <button id="admin-btn" onclick="toggleAdmin()"><i class="fas fa-crown text-gold text-3xl drop-shadow-lg"></i></button>
    
    <div id="admin-box" class="glass bg-black/90 border border-gold shadow-2xl">
        <h4 class="text-xs font-bold mb-3 border-b border-gold pb-1 text-gold uppercase"><i class="fas fa-shield-alt"></i> Security & Admin Panel</h4>
        
        <label class="text-[10px] block mb-1 text-gray-300">Ganti Logo Toko (Foto):</label>
        <button onclick="document.getElementById('up-logo').click()" class="text-[10px] bg-white/10 hover:bg-white/20 transition w-full py-2 rounded mb-3"><i class="fas fa-image"></i> Upload File Logo</button>
        <input type="file" id="up-logo" accept="image/*" onchange="upLogo(event)">

        <label class="text-[10px] block mb-1 text-gray-300">Ganti Lagu Latar (.mp3):</label>
        <button onclick="document.getElementById('up-audio').click()" class="text-[10px] bg-white/10 hover:bg-white/20 transition w-full py-2 rounded mb-3"><i class="fas fa-music"></i> Upload File Audio</button>
        <input type="file" id="up-audio" accept="audio/*" onchange="upAudio(event)">

        <label class="text-[10px] block mb-1 text-gray-300">Nomor WhatsApp Admin:</label>
        <input type="number" id="wa-input" placeholder="Contoh: 628123456" class="w-full bg-black border border-gray-600 text-xs p-2 mb-3 rounded focus:border-gold outline-none" onchange="updateWA(this.value)">
        
        <button onclick="toggleAdmin()" class="w-full text-[10px] bg-red-900/50 text-red-300 py-1 rounded border border-red-800">Tutup Panel</button>
        <p class="text-[8px] text-green-500 mt-2 text-center"><i class="fas fa-check-circle"></i> IPS/Firewall Active</p>
    </div>

    <audio id="main-audio" src="https://tinyurl.com/RatuAudio" loop></audio>

    <script>
        // --- PASSWORD ADMIN RAHASIA ---
        const ADMIN_PASSWORD = "ratu"; // Ratu bisa ganti tulisan "ratu" ini jadi password lain

        // --- DATABASE PRODUK ---
        let products = [
            { id: 1, name: "wong urip", price: tidakdijual, img: "foto-1 2026-03-19 at 13.40.41.jpeg" },
            { id: 2, name: "mba simbet", price: tidakdijual, img: "WhatsApp Image 2026-03-19 at 13.40.16.jpeg" },
            { id: 3, name: "Elegant Bag Edition", price: 1200000, img: "https://images.unsplash.com/photo-1584916201218-f4242ceb4809?auto=format&fit=crop&w=300&q=80" },
            { id: 4, name: "Royal Gold Ring", price: 2500000, img: "https://images.unsplash.com/photo-1605100804763-247f66122bc8?auto=format&fit=crop&w=300&q=80" }
        ];
        
        let cart = [];
        let myWA = "6285640056650";

        // --- MENGELUARKAN PRODUK KE LAYAR ---
        function showProds() {
            const container = document.getElementById('product-list');
            container.innerHTML = products.map(p => `
                <div class="product-card glass p-3 text-center flex flex-col justify-between">
                    <div>
                        <img src="${p.img}" class="w-full h-40 object-cover rounded-lg mb-3 shadow-lg">
                        <h3 class="text-xs font-medium h-8 overflow-hidden">${p.name}</h3>
                    </div>
                    <div>
                        <p class="gold-text text-sm font-bold mb-3">Rp ${p.price.toLocaleString('id-ID')}</p>
                        <button onclick="buy(${p.id})" class="btn-gold w-full py-2 rounded-md text-[10px] uppercase shadow-lg active:scale-95 transition">Tambah</button>
                    </div>
                </div>
            `).join('');
        }

        // --- SISTEM KEAMANAN (FIREWALL/IPS VIRTUAL) ---
        function toggleAdmin() {
            const box = document.getElementById('admin-box');
            
            if (box.style.display !== 'block') {
                const inputPW = prompt("🛡️ SECURITY CHECK: Masukkan Password Admin Ratu:");
                
                if (inputPW === ADMIN_PASSWORD) {
                    alert("Akses Diterima. Selamat Datang, Ratu! 👑");
                    box.style.display = 'block';
                } else {
                    alert("❌ AKSES DITOLAK: Password Salah! Sistem Keamanan memblokir Anda.");
                    console.warn("[FIREWALL ALERT] Ada yang mencoba masuk tanpa izin!");
                }
            } else {
                box.style.display = 'none';
            }
        }

        // --- SISTEM UPLOAD (FILE READER API) ---
        function upLogo(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => { document.getElementById('logo-img').src = ev.target.result; };
                reader.readAsDataURL(file);
                alert("Logo Berhasil Diperbarui secara Aman! ✨");
            }
        }

        function upAudio(e) {
            const file = e.target.files[0];
            const player = document.getElementById('main-audio');
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => { player.src = ev.target.result; player.play(); };
                reader.readAsDataURL(file);
                alert("Musik Berhasil Dimuat dan Diputar! 🎵");
            }
        }

        function updateWA(val) { 
            myWA = val; 
            alert("Nomor WhatsApp Berhasil Disinkronkan dengan Database!"); 
        }

        // --- SISTEM KERANJANG & CHECKOUT WA ---
        function buy(id) {
            const p = products.find(item => item.id === id);
            cart.push(p);
            document.getElementById('cart-count').innerText = cart.length;
            
            // Animasi kecil saat tombol diklik
            const cartIcon = document.getElementById('cart-count');
            cartIcon.classList.add('animate-bounce');
            setTimeout(() => cartIcon.classList.remove('animate-bounce'), 1000);
        }

        function checkOut() {
            if(cart.length === 0) return alert("Keranjang masih kosong, silakan pilih produk dulu ya, Ratu!");
            
            let total = 0;
            let teks = `Halo *Ratu Collection*, saya mau order pesanan eksklusif ini:\n\n`;
            
            cart.forEach((it, i) => { 
                teks += `${i+1}. ${it.name} - Rp ${it.price.toLocaleString('id-ID')}\n`; 
                total += it.price;
            });
            
            teks += `\n*Total Harga: Rp ${total.toLocaleString('id-ID')}*\n\nMohon info untuk pembayarannya ya. Terima kasih!`;
            
            window.open(`https://wa.me/${myWA}?text=${encodeURIComponent(teks)}`);
        }

        // --- MENJALANKAN SEMUA SAAT WEB DIBUKA ---
        window.onload = () => { 
            showProds(); 
            console.log("Ratu Collection Systems Online. Firewall Active. ✅");
        };
    </script>
</body>
</html>
