<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RATU COLLECTION | Quantum Sovereign Store 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root { 
            --royal-red: #ee4d2d; 
            --gold-gradient: linear-gradient(135deg, #D4AF37 0%, #f1c40f 100%);
            --dark-royal: #0a0a0a;
        }

        /* --- QUANTUM RESET --- */
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #f4f4f4; 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden; height: 100vh;
        }

        /* --- IMPERIAL INTRO (SHIELD MODE) --- */
        #quantum-shield {
            position: fixed; inset: 0; background: var(--dark-royal); z-index: 999999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: transform 0.8s cubic-bezier(0.7, 0, 0.3, 1), opacity 0.5s;
        }
        .royal-loader {
            width: 100px; height: 100px; border-radius: 50%;
            border: 3px solid transparent; border-top-color: #D4AF37;
            animation: spin 1s linear infinite; position: absolute;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- SYSTEM REFRESH BUTTON (CANGGIH) --- */
        #emergency-refresh {
            position: fixed; bottom: 100px; left: 20px; z-index: 9999;
            background: var(--gold-gradient); color: black;
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.5);
            cursor: pointer; animation: pulse-gold 2s infinite;
        }

        /* --- GRID ARCHITECTURE --- */
        .royal-grid-container {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 12px; padding: 15px; max-width: 1400px; margin: 0 auto;
        }
        @media (min-width: 1024px) { .royal-grid-container { grid-template-columns: repeat(4, 1fr); gap: 30px; } }

        .product-item {
            background: white; border-radius: 15px; overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03); transition: 0.4s ease;
            position: relative; border: 1px solid rgba(0,0,0,0.05);
        }
        .product-item:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        
        .image-box { position: relative; width: 100%; padding-top: 135%; background: #f9f9f9; }
        .image-box img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }

        /* --- NAVIGATION LUXURY --- */
        .nav-top {
            background: linear-gradient(90deg, #f53d2d, #ff6633);
            position: sticky; top: 0; z-index: 10000; padding: 15px 20px;
            display: flex; align-items: center; justify-content: space-between;
        }

        /* --- DRAWER SYSTEM --- */
        .drawer-side {
            position: fixed; top: 0; right: 0; bottom: 0; width: 100%; max-width: 450px;
            background: white; z-index: 50000; transform: translateX(100%);
            transition: 0.6s cubic-bezier(0.2, 1, 0.2, 1);
        }
        .drawer-side.open { transform: translateX(0); }
        .master-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 45000; display: none; backdrop-filter: blur(10px);
        }

        /* --- KEY ANIMATIONS --- */
        @keyframes pulse-gold {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(212, 175, 55, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }
    </style>
</head>
<body id="imperial-app">

    <div id="quantum-shield" onclick="igniteEngine()">
        <div class="relative flex items-center justify-center">
            <div class="royal-loader"></div>
            <img src="Gemini_Generated_Image_gfusskgfusskgfus.png" class="w-20 h-20 rounded-full border-2 border-white shadow-2xl z-10">
        </div>
        <h1 class="text-white font-black text-2xl tracking-[12px] mt-10 animate__animated animate__pulse animate__infinite">RATU COLLECTION</h1>
        <p class="text-white/30 text-[9px] mt-5 tracking-[5px] uppercase">Klik Untuk Inisialisasi Sistem</p>
    </div>

    <div id="emergency-refresh" onclick="forceSystemReboot()" title="Reboot System">
        <i class="fas fa-sync-alt fa-spin"></i>
    </div>

    <div id="master-overlay" class="master-overlay" onclick="closeAll()"></div>

    <header class="nav-top shadow-xl">
        <div class="flex items-center gap-3">
            <img src="Gemini_Generated_Image_gfusskgfusskgfus.png" class="w-10 h-10 rounded-full border-2 border-white">
            <span class="text-white font-black text-xs tracking-tighter uppercase">Ratu Collection</span>
        </div>
        <div class="flex gap-5 text-white text-xl">
            <div class="relative" onclick="openDrawer('cart-drawer')">
                <i class="fas fa-shopping-bag"></i>
                <span id="badge-count" class="absolute -top-2 -right-2 bg-white text-red-600 text-[9px] font-black px-1.5 rounded-full hidden border border-red-600">0</span>
            </div>
            <i class="fas fa-bars" onclick="openDrawer('chat-drawer')"></i>
        </div>
    </header>

    <main class="min-h-screen pb-32">
        <div class="bg-white p-5 border-b flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-1 h-5 bg-red-600"></div>
                <h2 class="font-black text-xs uppercase tracking-widest text-gray-800 italic">Koleksi Royal 2026</h2>
            </div>
            <div class="flex gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
                <span class="text-[9px] font-bold text-gray-400">SERVER ACTIVE</span>
            </div>
        </div>

        <div id="grid-engine" class="royal-grid-container">
            </div>
    </main>

    <div id="cart-drawer" class="drawer-side">
        <div class="p-6 border-b flex justify-between items-center bg-white sticky top-0 z-10">
            <h3 class="font-black text-xl italic uppercase">Checkout Ratu</h3>
            <i class="fas fa-times text-2xl text-gray-200" onclick="closeAll()"></i>
        </div>
        <div id="cart-list-render" class="flex-1 overflow-y-auto p-5 space-y-4"></div>
        <div class="p-8 border-t bg-white">
            <div class="flex justify-between mb-6">
                <span class="font-bold text-gray-400 text-xs">TOTAL TAGIHAN:</span>
                <span id="total-price-text" class="font-black text-2xl text-red-600">Rp 0</span>
            </div>
            <button onclick="openFinalCheckout()" class="w-full py-5 bg-black text-white font-black rounded-2xl tracking-[4px] uppercase text-xs shadow-2xl">Beli Sekarang</button>
        </div>
    </div>

    <div id="chat-drawer" class="drawer-side">
        <div class="p-6 border-b flex justify-between items-center bg-white">
            <h3 class="font-black text-xl italic uppercase">Admin Support</h3>
            <i class="fas fa-times text-2xl text-gray-200" onclick="closeAll()"></i>
        </div>
        <div class="p-10 flex flex-col items-center text-center">
            <div class="w-20 h-20 bg-green-50 text-green-500 rounded-full flex items-center justify-center text-4xl mb-5 shadow-inner"><i class="fab fa-whatsapp"></i></div>
            <h4 class="font-black text-lg mb-2">Layanan VIP Ratu</h4>
            <p class="text-xs text-gray-400 leading-relaxed mb-8">Butuh bantuan mengenai ukuran atau pengiriman? Admin kami siap melayani Anda 24/7.</p>
            <button onclick="contactWA('Halo Admin, saya Ratu...')" class="w-full py-4 bg-[#25d366] text-white font-black rounded-full shadow-lg">HUBUNGI WHATSAPP</button>
        </div>
    </div>

    <div id="detail-sheet" class="master-overlay" style="display:none; align-items: flex-end; justify-content: center; z-index: 60000;" onclick="closeAll()">
        <div class="bg-white w-full max-w-[600px] rounded-t-[40px] overflow-hidden animate__animated animate__slideInUp animate__faster" onclick="event.stopPropagation()">
            <div class="relative h-[450px]">
                <img id="view-img" src="" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                <button onclick="closeAll()" class="absolute top-6 right-6 bg-white/20 backdrop-blur-md text-white w-12 h-12 rounded-full flex items-center justify-center text-2xl">&times;</button>
                <div class="absolute bottom-8 left-8 text-white">
                    <h2 id="view-name" class="font-black text-2xl mb-2 italic"></h2>
                    <p id="view-price" class="text-red-500 font-black text-3xl"></p>
                </div>
            </div>
            <div class="p-8 pb-12">
                <div class="bg-gray-50 p-6 rounded-3xl border border-gray-100 mb-8">
                    <span class="text-[9px] font-black text-gray-300 uppercase tracking-widest mb-2 block">Spesifikasi Royal</span>
                    <p id="view-desc" class="text-xs text-gray-600 leading-relaxed"></p>
                </div>
                <button onclick="execAddToCart()" class="w-full py-5 bg-[#ee4d2d] text-white font-black rounded-2xl uppercase tracking-[3px] text-xs shadow-xl">Masukkan Keranjang Ratu</button>
            </div>
        </div>
    </div>

    <div id="checkout-sheet" class="master-overlay" style="display:none; align-items: flex-end; justify-content: center; z-index: 70000;" onclick="closeAll()">
        <div class="bg-white w-full max-w-[600px] p-10 rounded-t-[40px] animate__animated animate__slideInUp animate__faster" onclick="event.stopPropagation()">
            <h3 class="text-2xl font-black mb-10 text-center uppercase tracking-tighter italic">Formulir Pesanan <span class="text-red-600">Ratu</span></h3>
            <div class="space-y-4">
                <input type="text" id="cust-name" placeholder="Nama Lengkap Ratu" class="w-full bg-gray-50 border-2 p-5 rounded-2xl outline-none focus:border-red-500 font-bold transition">
                <textarea id="cust-address" placeholder="Alamat Pengiriman Lengkap" class="w-full bg-gray-50 border-2 p-5 rounded-2xl outline-none h-28 focus:border-red-500 font-bold transition"></textarea>
                <select id="cust-pay" class="w-full bg-gray-50 border-2 p-5 rounded-2xl font-black">
                    <option>BCA Transfer</option>
                    <option>DANA / ShopeePay</option>
                    <option>COD (Bayar Ditempat)</option>
                </select>
            </div>
            <button onclick="submitToWA()" class="w-full py-6 bg-black text-white font-black rounded-3xl uppercase mt-10 tracking-[5px] text-[10px] shadow-2xl">Konfirmasi Pesanan</button>
        </div>
    </div>

    <audio id="audio-bgm" src="trtasfiq-sad-piano-instrumental-background-music-279069 (1).mp3" loop></audio>

    <script>
        // --- MASTER SYSTEM DATA ---
        let waNumber = "6285640056650";
        let cartItems = [];
        let activeProduct = null;

        const products = [
            { id: 1, name: "Wong Urip Signature - Royal Black 2026", price: 0, tag: "Exclusive", img: "foto-1 2026-03-19 at 13.40.41.jpeg", desc: "Produk mahakarya eksklusif Ratu Collection dengan jahitan tangan seniman profesional. Bahan premium internasional." },
            { id: 2, name: "Mba Simbet Elegance - Pearl White Silk", price: 0, tag: "Premium Edition", img: "WhatsApp Image 2026-03-19 at 13.40.16.jpeg", desc: "Sutra pilihan dengan kilau mutiara alami. Memancarkan aura keanggunan sejati untuk acara spesial Ratu." },
            { id: 3, name: "Gold Majesty Crown Handbag - International", price: 1850000, tag: "Rp 1.850.000", img: "https://images.unsplash.com/photo-1590874103328-eac38a683ce7?w=600", desc: "Tas tangan mewah dengan aksen mahkota emas. Simbol kemewahan go-internasional." },
            { id: 4, name: "Royal Diamond Crown Ring - High Quality", price: 3200000, tag: "Rp 3.200.000", img: "https://images.unsplash.com/photo-1605100804763-247f66122bc8?w=600", desc: "Cincin mahkota berlian imitasi kualitas terbaik. Bersinar indah di jemari Ratu." }
        ];

        // --- QUANTUM REBOOT ENGINE (Saran Ratu) ---
        function forceSystemReboot() {
            console.log("Rebooting Imperial Engine...");
            const grid = document.getElementById('grid-engine');
            
            // 1. Tampilkan Efek Loading
            grid.innerHTML = `
                <div class="col-span-2 py-20 text-center animate__animated animate__fadeIn">
                    <i class="fas fa-sync-alt fa-spin text-4xl text-gold-dark mb-4"></i>
                    <p class="text-[10px] font-black uppercase tracking-[4px]">Revalidating Quantum Path...</p>
                </div>
            `;

            // 2. Jalankan Perbaikan Link & Render Ulang
            setTimeout(() => {
                rebuildProductGrid();
                alert("✨ Sistem Ratu Collection Berhasil Di-Refresh!");
            }, 800);
        }

        // --- SISTEM INISIALISASI ---
        function igniteEngine() {
            const intro = document.getElementById('quantum-shield');
            const bgm = document.getElementById('audio-bgm');
            
            // Putar Musik
            bgm.play().catch(e => console.log("Audio Play Blocked"));

            // Hapus Shield
            intro.style.transform = "translateY(-100%)";
            setTimeout(() => {
                intro.remove();
                document.body.style.height = "auto";
                document.body.style.overflow = "auto";
                rebuildProductGrid(); // Panggil Render
            }, 800);
        }

        // --- RENDER ENGINE (PERBAIKAN ERROR PRODUK TIDAK MUNCUL) ---
        function rebuildProductGrid() {
            const grid = document.getElementById('grid-engine');
            if(!grid) return;

            grid.innerHTML = products.map(p => {
                // Perbaikan Path Gambar (Spasi ke URL Safe)
                const safeImg = encodeURI(p.img);
                
                return `
                <div class="product-item animate__animated animate__fadeInUp" onclick="viewDetail(${p.id})">
                    <div class="image-box">
                        <img src="${safeImg}" onerror="this.src='https://via.placeholder.com/400x533?text=Ratu+Collection'">
                        <div class="absolute bottom-3 left-3 bg-black/60 backdrop-blur-md text-white text-[7px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Official</div>
                    </div>
                    <div class="p-4">
                        <h3 class="text-[10px] font-black text-gray-800 line-clamp-2 h-8 uppercase italic tracking-tighter">${p.name}</h3>
                        <p class="text-red-600 font-black text-sm mt-3">${p.tag}</p>
                        <div class="flex items-center gap-1 mt-2 opacity-30">
                            <i class="fas fa-star text-yellow-400 text-[8px]"></i>
                            <span class="text-[8px] font-bold">5.0 | High Quality</span>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        // --- UI LOGIC ---
        function viewDetail(id) {
            activeProduct = products.find(x => x.id === id);
            document.getElementById('view-img').src = encodeURI(activeProduct.img);
            document.getElementById('view-name').innerText = activeProduct.name;
            document.getElementById('view-price').innerText = activeProduct.tag;
            document.getElementById('view-desc').innerText = activeProduct.desc;
            
            document.getElementById('detail-sheet').style.display = 'flex';
            document.getElementById('master-overlay').style.display = 'block';
        }

        function openDrawer(id) {
            document.getElementById(id).classList.add('open');
            document.getElementById('master-overlay').style.display = 'block';
            if(id === 'cart-drawer') renderCart();
        }

        function closeAll() {
            document.querySelectorAll('.drawer-side').forEach(d => d.classList.remove('open'));
            document.getElementById('master-overlay').style.display = 'none';
            document.getElementById('detail-sheet').style.display = 'none';
            document.getElementById('checkout-sheet').style.display = 'none';
        }

        // --- CART SYSTEM ---
        function execAddToCart() {
            const exists = cartItems.find(i => i.id === activeProduct.id);
            if(exists) exists.qty++; else cartItems.push({...activeProduct, qty: 1});
            
            updateBadge();
            closeAll();
            alert("Berhasil ditambahkan ke Keranjang! ✨");
        }

        function updateBadge() {
            const b = document.getElementById('badge-count');
            const total = cartItems.reduce((a, b) => a + b.qty, 0);
            if(total > 0) { b.innerText = total; b.classList.remove('hidden'); }
            else b.classList.add('hidden');
        }

        function renderCart() {
            const list = document.getElementById('cart-list-render');
            const totalText = document.getElementById('total-price-text');
            let sum = 0;

            if(cartItems.length === 0) {
                list.innerHTML = `<div class="text-center mt-20 opacity-20"><i class="fas fa-shopping-bag text-7xl mb-4"></i><p class="text-[10px] font-black">KERANJANG KOSONG</p></div>`;
                totalText.innerText = "Rp 0";
                return;
            }

            list.innerHTML = cartItems.map(i => {
                sum += (i.price * i.qty);
                return `
                <div class="bg-white p-4 rounded-3xl border border-gray-100 flex gap-4 shadow-sm">
                    <img src="${encodeURI(i.img)}" class="w-16 h-20 object-cover rounded-2xl shadow-md">
                    <div class="flex-1">
                        <h4 class="text-[9px] font-black uppercase text-gray-400 tracking-tighter">${i.name}</h4>
                        <p class="text-red-600 font-black text-xs mt-1">${i.tag}</p>
                        <div class="flex items-center gap-4 mt-3">
                            <div class="flex items-center bg-gray-50 rounded-full px-2 border">
                                <button onclick="changeQty(${i.id}, -1)" class="w-8 h-8 font-bold">-</button>
                                <span class="px-3 text-xs font-bold">${i.qty}</span>
                                <button onclick="changeQty(${i.id}, 1)" class="w-8 h-8 font-bold">+</button>
                            </div>
                            <i class="far fa-trash-alt text-gray-200 ml-auto" onclick="delItem(${i.id})"></i>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
            totalText.innerText = sum > 0 ? "Rp " + sum.toLocaleString('id-ID') : "Tanya Admin";
        }

        function changeQty(id, d) {
            const i = cartItems.find(x => x.id === id); i.qty += d;
            if(i.qty < 1) delItem(id);
            renderCart(); updateBadge();
        }

        function delItem(id) {
            cartItems = cartItems.filter(x => x.id !== id);
            renderCart(); updateBadge();
        }

        // --- CHECKOUT LOGIC ---
        function openFinalCheckout() {
            if(cartItems.length === 0) return;
            closeAll();
            document.getElementById('checkout-sheet').style.display = 'flex';
            document.getElementById('master-overlay').style.display = 'block';
        }

        function submitToWA() {
            const n = document.getElementById('cust-name').value;
            const a = document.getElementById('cust-address').value;
            const p = document.getElementById('cust-pay').value;

            if(!n || !a) return alert("Ratu, mohon isi Nama dan Alamat!");

            const barang = cartItems.map(i => `- ${i.name} (${i.qty}x)`).join('\n');
            const total = document.getElementById('total-price-text').innerText;
            const pesan = `Halo Admin Ratu Collection! ✨\n\nSAYA PESAN:\n${barang}\n\n💰 TOTAL: ${total}\n📍 ALAMAT: ${a}\n💳 BAYAR: ${p}\n👤 NAMA: ${n}\n\nTerima kasih Admin! 👑`;
            
            window.open(`https://wa.me/${waNumber}?text=${encodeURIComponent(pesan)}`);
        }

        function contactWA(txt) { window.open(`https://wa.me/${waNumber}?text=${encodeURIComponent(txt)}`); }

        // --- AUTO START ---
        window.addEventListener('load', rebuildProductGrid);
    </script>
</body>
</html>
