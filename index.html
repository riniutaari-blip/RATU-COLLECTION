<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RATU COLLECTION | Shopee Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --shopee-orange: #ee4d2d; --gold: #D4AF37; --bg-light: #f5f5f5; }
        body { background-color: var(--bg-light); font-family: sans-serif; margin: 0; }
        
        #intro-overlay {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; justify-content: center; align-items: center;
            animation: fadeOut 1s ease 3s forwards;
        }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        .shopee-header { background: linear-gradient(-180deg,#f53d2d,#ff6633); position: sticky; top: 0; z-index: 1000; }
        .product-card { background: #fff; border-radius: 2px; overflow: hidden; box-shadow: 0 1px 1px rgba(0,0,0,0.05); cursor: pointer; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; display: none; align-items: flex-end; }
        .modal-body { background: #fff; width: 100%; max-height: 85vh; border-top-left-radius: 15px; border-top-right-radius: 15px; padding: 20px; overflow-y: auto; }
        .modal-show { display: flex; }

        .form-input { width: 100%; border: 1px solid #ddd; border-radius: 4px; padding: 10px; margin-bottom: 10px; font-size: 14px; outline: none; }
        .btn-shopee { background: var(--shopee-orange); color: #fff; width: 100%; padding: 12px; font-weight: bold; text-align: center; border-radius: 2px; border: none; }
        
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <h1 style="color:white; font-weight: bold; letter-spacing: 5px;">RATU COLLECTION</h1>
    </div>

    <header class="shopee-header p-3 flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-white overflow-hidden border-2 border-white">
            <img src="Gemini_Generated_Image_gfusskgfusskgfus.png" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/50/D4AF37/000000?text=R'">
        </div>
        <div class="flex-1 bg-white rounded-sm h-9 flex items-center px-3 text-gray-400 text-sm">
            <i class="fas fa-search mr-2"></i> Cari Produk Ratu...
        </div>
        <i class="fas fa-shopping-cart text-white text-xl"></i>
    </header>

    <div class="bg-white p-4 mb-2 grid grid-cols-4 text-center text-[10px] text-gray-600">
        <div><i class="fas fa-bolt text-orange-500 text-xl mb-1"></i><br>Flash Sale</div>
        <div><i class="fas fa-coins text-yellow-500 text-xl mb-1"></i><br>Koin</div>
        <div><i class="fas fa-truck text-blue-500 text-xl mb-1"></i><br>Gratis Ongkir</div>
        <div><i class="fas fa-star text-purple-500 text-xl mb-1"></i><br>Ratu Mall</div>
    </div>

    <div class="p-2">
        <h2 class="text-sm font-bold text-gray-800 mb-3 border-l-4 border-red-500 pl-2 uppercase">Rekomendasi Ratu</h2>
        <div id="product-grid" class="grid grid-cols-2 gap-2">
            </div>
    </div>

    <div id="modal-detail" class="modal-overlay" onclick="closeModal('modal-detail')">
        <div class="modal-body" onclick="event.stopPropagation()">
            <div class="flex gap-4 mb-4">
                <img id="m-img" src="" class="w-24 h-24 object-cover border">
                <div>
                    <p id="m-price" class="text-xl font-bold text-red-500"></p>
                    <p class="text-xs text-gray-400">Stok: 99+</p>
                </div>
            </div>
            <h3 id="m-name" class="font-bold text-gray-800 mb-2 border-t pt-2"></h3>
            <p id="m-desc" class="text-sm text-gray-600 mb-6"></p>
            <button onclick="openCheckout()" class="btn-shopee uppercase">Beli Sekarang</button>
        </div>
    </div>

    <div id="modal-checkout" class="modal-overlay" onclick="closeModal('modal-checkout')">
        <div class="modal-body" onclick="event.stopPropagation()">
            <h3 class="font-bold mb-4 border-b pb-2"><i class="fas fa-map-marker-alt text-red-500"></i> Konfirmasi Pesanan</h3>
            <input id="p-prov" type="text" placeholder="Provinsi" class="form-input">
            <input id="p-kota" type="text" placeholder="Kota / Kabupaten" class="form-input">
            <input id="p-desa" type="text" placeholder="Desa / Kelurahan" class="form-input">
            <div class="flex gap-2">
                <input id="p-rt" type="text" placeholder="RT / RW" class="form-input">
                <input id="p-rumah" type="text" placeholder="No. Rumah" class="form-input">
            </div>
            <select id="p-pay" class="form-input">
                <option value="Transfer Bank BCA">Bank BCA</option>
                <option value="DANA / ShopeePay">E-Wallet</option>
                <option value="COD (Bayar di Tempat)">COD</option>
            </select>
            <button onclick="sendWA()" class="btn-shopee mt-4">KIRIM KE WHATSAPP</button>
        </div>
    </div>

    <audio id="musik" src="https://tinyurl.com/RatuAudio" loop></audio>

    <script>
        // Data Produk - Nama file menggunakan encodeURIComponent untuk menangani spasi
        const products = [
            { 
                id: 1, 
                name: "Wong Urip Premium Collection", 
                price: 0, 
                dPrice: "Hubungi Admin", 
                img: encodeURI("foto-1 2026-03-19 at 13.40.41.jpeg"), 
                desc: "Koleksi eksklusif dengan bahan kualitas tinggi, sangat nyaman dan memberikan kesan mewah saat dipakai." 
            },
            { 
                id: 2, 
                name: "Mba Simbet Royal Edition", 
                price: 0, 
                dPrice: "Limited Edition", 
                img: encodeURI("WhatsApp Image 2026-03-19 at 13.40.16.jpeg"), 
                desc: "Desain khusus yang elegan, cocok untuk Ratu yang ingin tampil beda dan mempesona." 
            },
            { 
                id: 3, 
                name: "Elegant Luxury Bag", 
                price: 1200000, 
                dPrice: "Rp 1.200.000", 
                img: "https://images.unsplash.com/photo-1584916201218-f4242ceb4809?w=400", 
                desc: "Tas tangan impor dengan aksen emas berkelas dunia." 
            },
            { 
                id: 4, 
                name: "Royal Gold Ring 24K", 
                price: 2500000, 
                dPrice: "Rp 2.500.000", 
                img: "https://images.unsplash.com/photo-1605100804763-247f66122bc8?w=400", 
                desc: "Cincin emas murni dengan ukiran mahkota khas Ratu Collection." 
            }
        ];

        let selectedProduct = null;

        function render() {
            const grid = document.getElementById('product-grid');
            if(!grid) return;
            
            grid.innerHTML = products.map(p => `
                <div class="product-card" onclick="openDetail(${p.id})">
                    <img src="${p.img}" class="w-full h-44 object-cover" onerror="this.src='https://via.placeholder.com/200?text=Gambar+Ratu'">
                    <div class="p-2">
                        <p class="text-[11px] text-gray-700 h-8 line-clamp-2">${p.name}</p>
                        <p class="text-red-500 font-bold text-sm mt-1">${p.dPrice}</p>
                        <p class="text-[9px] text-gray-400 mt-1 italic">Terjual 1rb+</p>
                    </div>
                </div>
            `).join('');
        }

        function openDetail(id) {
            selectedProduct = products.find(p => p.id === id);
            document.getElementById('m-img').src = selectedProduct.img;
            document.getElementById('m-name').innerText = selectedProduct.name;
            document.getElementById('m-price').innerText = selectedProduct.dPrice;
            document.getElementById('m-desc').innerText = selectedProduct.desc;
            document.getElementById('modal-detail').classList.add('modal-show');
            document.getElementById('musik').play().catch(() => {});
        }

        function closeModal(id) { document.getElementById(id).classList.remove('modal-show'); }
        function openCheckout() { closeModal('modal-detail'); document.getElementById('modal-checkout').classList.add('modal-show'); }

        function sendWA() {
            const prov = document.getElementById('p-prov').value;
            const kota = document.getElementById('p-kota').value;
            const desa = document.getElementById('p-desa').value;
            const pay = document.getElementById('p-pay').value;
            
            if(!prov || !kota || !desa) return alert("Mohon isi alamat lengkapnya, Ratu!");

            const teks = `Halo Ratu Collection! ✨\n\nPESANAN BARU:\n🛍️ *${selectedProduct.name}*\n💰 Harga: ${selectedProduct.dPrice}\n\n📍 *ALAMAT:*\nProv: ${prov}\nKota: ${kota}\nDesa: ${desa}\nRT/RW: ${document.getElementById('p-rt').value}\nNo: ${document.getElementById('p-rumah').value}\n\n💳 *PEMBAYARAN:* ${pay}`;
            window.open(`https://wa.me/6285640056650?text=${encodeURIComponent(teks)}`);
        }

        // Pastikan fungsi jalan setelah semua siap
        window.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
