<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RATU COLLECTION | Official Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { 
            --shopee-orange: #ee4d2d; 
            --gold: #D4AF37; 
            --bg-light: #f5f5f5; 
            --white: #ffffff;
        }

        body { 
            background-color: var(--bg-light); 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto;
            margin: 0; overflow-x: hidden; 
        }

        /* --- INTRO ANIMATION --- */
        #intro-overlay {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            animation: fadeOut 1s ease 3.5s forwards;
        }
        .intro-logo {
            width: 140px; height: 140px; border-radius: 50%; border: 3px solid var(--gold);
            object-cover: cover; filter: drop-shadow(0 0 15px var(--gold));
            animation: zoomPulse 2s infinite ease-in-out;
        }
        @keyframes zoomPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* --- SHOPEE UI ELEMENTS --- */
        .shopee-gradient { background: linear-gradient(-180deg,#f53d2d,#ff6633); }
        
        /* PORTRAIT IMAGE SYSTEM */
        .img-portrait-container {
            width: 100%;
            padding-top: 133.33%; /* Aspect Ratio 3:4 */
            position: relative;
            background: #eee;
        }
        .img-portrait-container img {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover;
        }

        .product-card { 
            background: var(--white); border-radius: 4px; overflow: hidden; 
            box-shadow: 0 1px 1px rgba(0,0,0,0.05); transition: 0.2s;
        }
        .product-card:active { transform: scale(0.97); background: #fdfdfd; }

        /* --- MODAL SYSTEM --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            z-index: 2000; display: none; align-items: flex-end;
            backdrop-filter: blur(2px);
        }
        .modal-body {
            background: var(--white); width: 100%; max-height: 85vh;
            border-top-left-radius: 20px; border-top-right-radius: 20px;
            padding: 24px; overflow-y: auto; transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .modal-show { display: flex; }
        .modal-show .modal-body { transform: translateY(0); }

        .form-input {
            width: 100%; border: 1px solid #e0e0e0; border-radius: 6px;
            padding: 12px; margin-bottom: 12px; font-size: 14px; outline: none;
            transition: 0.3s;
        }
        .form-input:focus { border-color: var(--shopee-orange); box-shadow: 0 0 0 2px rgba(238, 77, 45, 0.1); }

        .btn-buy {
            background: var(--shopee-orange); color: white;
            width: 100%; padding: 14px; border-radius: 4px;
            font-weight: bold; text-transform: uppercase; letter-spacing: 1px;
        }

        /* VOUCHERS */
        .voucher-tag {
            background: #fff5f1; color: var(--shopee-orange);
            border: 1px solid var(--shopee-orange);
            font-size: 10px; padding: 0 4px; border-radius: 2px;
        }
        
        /* --- CUSTOM SCROLLBAR --- */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <img src="Gemini_Generated_Image_gfusskgfusskgfus.png" class="intro-logo" onerror="this.src='https://via.placeholder.com/150/D4AF37/000000?text=RATU'">
        <p class="mt-4 text-white tracking-[8px] font-light text-xs animate-pulse">RATU COLLECTION</p>
    </div>

    <header class="shopee-gradient p-3 sticky top-0 z-[1000] shadow-lg">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full border-2 border-white overflow-hidden bg-white shadow-inner">
                <img src="Gemini_Generated_Image_gfusskgfusskgfus.png" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/50/D4AF37/000000?text=R'">
            </div>
            <div class="flex-1 bg-white h-9 rounded flex items-center px-3 shadow-inner">
                <i class="fas fa-search text-gray-400 mr-2 text-sm"></i>
                <input type="text" placeholder="Cari Koleksi Mewah..." class="w-full text-sm outline-none bg-transparent text-gray-700">
            </div>
            <div class="relative active:scale-90 transition" onclick="alert('Keranjang Anda Sedang Diproses!')">
                <i class="fas fa-shopping-cart text-white text-xl"></i>
                <span id="cart-badge" class="absolute -top-2 -right-2 bg-white text-[#f53d2d] text-[10px] font-bold px-1.5 rounded-full border border-red-500">0</span>
            </div>
        </div>
    </header>

    <div class="bg-white px-4 py-2 flex items-center gap-4 overflow-x-auto no-scrollbar border-b">
        <div class="flex flex-col items-center min-w-[60px]">
            <div class="w-10 h-10 bg-orange-100 rounded-2xl flex items-center justify-center text-orange-600 mb-1"><i class="fas fa-bolt"></i></div>
            <span class="text-[10px]">Flash Sale</span>
        </div>
        <div class="flex flex-col items-center min-w-[60px]">
            <div class="w-10 h-10 bg-blue-100 rounded-2xl flex items-center justify-center text-blue-600 mb-1"><i class="fas fa-truck"></i></div>
            <span class="text-[10px]">Free Ongkir</span>
        </div>
        <div class="flex flex-col items-center min-w-[60px]">
            <div class="w-10 h-10 bg-yellow-100 rounded-2xl flex items-center justify-center text-yellow-600 mb-1"><i class="fas fa-coins"></i></div>
            <span class="text-[10px]">Koin</span>
        </div>
        <div class="flex flex-col items-center min-w-[60px]">
            <div class="w-10 h-10 bg-purple-100 rounded-2xl flex items-center justify-center text-purple-600 mb-1"><i class="fas fa-gift"></i></div>
            <span class="text-[10px]">Voucher</span>
        </div>
    </div>

    <main class="p-2 pb-24">
        <div class="flex items-center gap-2 mb-4 mt-2 px-1">
            <div class="w-1 h-5 bg-red-500 rounded-full"></div>
            <h2 class="text-sm font-bold text-gray-800 uppercase tracking-wider">Koleksi Terlaris</h2>
        </div>
        <div id="product-container" class="grid grid-cols-2 gap-2">
            </div>
    </main>

    <div id="modal-detail" class="modal-overlay" onclick="closeModal('modal-detail')">
        <div class="modal-body" onclick="event.stopPropagation()">
            <div class="flex justify-between items-start mb-6">
                <div class="w-28 h-36 rounded-lg overflow-hidden shadow-md border">
                    <img id="m-img" src="" class="w-full h-full object-cover">
                </div>
                <div class="flex-1 px-4">
                    <p id="m-price" class="text-2xl font-bold text-[#ee4d2d]"></p>
                    <div class="flex gap-1 mt-2">
                        <span class="voucher-tag">Diskon 50%</span>
                        <span class="voucher-tag">Koin</span>
                    </div>
                </div>
                <button onclick="closeModal('modal-detail')" class="text-gray-300 text-3xl">&times;</button>
            </div>
            <div class="space-y-4">
                <h3 id="m-title" class="text-lg font-bold text-gray-800 leading-tight"></h3>
                <div class="bg-gray-50 p-3 rounded-lg border border-dashed border-gray-300">
                    <p class="text-[11px] text-gray-400 uppercase font-bold mb-1">Deskripsi Produk</p>
                    <p id="m-desc" class="text-xs text-gray-600 leading-relaxed"></p>
                </div>
                <button onclick="openCheckout()" class="btn-buy shadow-lg active:translate-y-1 transition">🛒 Masukkan Keranjang</button>
            </div>
        </div>
    </div>

    <div id="modal-checkout" class="modal-overlay" onclick="closeModal('modal-checkout')">
        <div class="modal-body" onclick="event.stopPropagation()">
            <div class="flex items-center gap-3 mb-6 border-b pb-3">
                <i class="fas fa-map-marked-alt text-red-500 text-xl"></i>
                <h3 class="font-bold text-gray-800">Detail Pengiriman</h3>
            </div>
            
            <label class="text-[10px] font-bold text-gray-400 uppercase px-1">Wilayah</label>
            <input type="text" id="inp-prov" placeholder="Provinsi" class="form-input">
            <input type="text" id="inp-kota" placeholder="Kota / Kabupaten" class="form-input">
            <input type="text" id="inp-desa" placeholder="Desa / Kelurahan" class="form-input">
            
            <label class="text-[10px] font-bold text-gray-400 uppercase px-1">Detail Rumah</label>
            <div class="flex gap-2">
                <input type="text" id="inp-rt" placeholder="RT / RW" class="form-input">
                <input type="text" id="inp-rumah" placeholder="No. Rumah" class="form-input">
            </div>

            <label class="text-[10px] font-bold text-gray-400 uppercase px-1">Opsi Pembayaran</label>
            <select id="inp-pay" class="form-input bg-gray-50">
                <option value="Transfer Bank BCA">Bank Central Asia (BCA)</option>
                <option value="Mandiri / BRI / BNI">Bank Mandiri / BRI / BNI</option>
                <option value="DANA / ShopeePay / OVO">E-Wallet (Dana/ShopeePay)</option>
                <option value="COD (Bayar di Tempat)">COD (Bayar Saat Barang Datang)</option>
            </select>

            <button onclick="submitOrder()" class="btn-buy mt-4 bg-black border-t-4 border-red-500">Konfirmasi Pesanan</button>
        </div>
    </div>

    <nav class="fixed bottom-0 inset-x-0 bg-white border-t flex justify-around py-2 z-[1500] shadow-2xl">
        <div class="text-orange-600 text-center"><i class="fas fa-home text-lg"></i><p class="text-[9px]">Beranda</p></div>
        <div class="text-gray-400 text-center"><i class="fas fa-tags text-lg"></i><p class="text-[9px]">Promo</p></div>
        <div class="text-gray-400 text-center"><i class="fas fa-clipboard-list text-lg"></i><p class="text-[9px]">Pesanan</p></div>
        <div class="text-gray-400 text-center"><i class="fas fa-user text-lg"></i><p class="text-[9px]">Saya</p></div>
    </nav>

    <audio id="audio-player" src="trtasfiq-sad-piano-instrumental-background-music-279069 (1).mp3" loop></audio>

    <script>
        // --- DATABASE PRODUK ---
        // Menggunakan encodeURIComponent agar nama file dengan spasi tidak error di GitHub
        const collection = [
            { 
                id: 101, 
                name: "Wong Urip Signature - Royal Black Fabric", 
                price: 0, 
                priceText: "Hubungi Admin", 
                img: encodeURI("foto-1 2026-03-19 at 13.40.41.jpeg"),
                desc: "Material kain premium dengan sentuhan magis yang nyaman dipakai seharian. Koleksi paling dicari di Ratu Collection." 
            },
            { 
                id: 102, 
                name: "Mba Simbet Elegance Dress - White Pearl", 
                price: 0, 
                priceText: "Limited Stock", 
                img: encodeURI("WhatsApp Image 2026-03-19 at 13.40.16.jpeg"),
                desc: "Desain elegan yang menonjolkan sisi feminin Ratu. Sangat cocok untuk pesta atau acara formal lainnya." 
            },
            { 
                id: 103, 
                name: "International Gold Crown Bag", 
                price: 1350000, 
                priceText: "Rp 1.350.000", 
                img: "https://images.unsplash.com/photo-1590874103328-eac38a683ce7?w=500&q=80",
                desc: "Tas impor dengan material kulit sintetis grade A dan ornamen emas murni." 
            },
            { 
                id: 104, 
                name: "Royal Diamond Wedding Ring", 
                price: 4700000, 
                priceText: "Rp 4.700.000", 
                img: "https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?w=500&q=80",
                desc: "Cincin perhiasan eksklusif yang dirancang khusus untuk memancarkan aura kemewahan Ratu." 
            },
            { 
                id: 105, 
                name: "Silk Scarf Luxury Edition", 
                price: 450000, 
                priceText: "Rp 450.000", 
                img: "https://images.unsplash.com/photo-1584030373081-f37b7bb4fa82?w=500&q=80",
                desc: "Sutra pilihan dengan corak artistik yang hanya tersedia di Ratu Collection." 
            },
            { 
                id: 106, 
                name: "Royal Heels - Gold Series", 
                price: 2100000, 
                priceText: "Rp 2.100.000", 
                img: "https://images.unsplash.com/photo-1543163521-1bf539c55dd2?w=500&q=80",
                desc: "Sepatu hak tinggi yang didesain untuk kenyamanan maksimal tanpa mengurangi kesan elegan." 
            }
        ];

        let selectedItem = null;

        // --- CORE FUNCTIONS ---
        function renderItems() {
            const container = document.getElementById('product-container');
            container.innerHTML = collection.map(item => `
                <div class="product-card" onclick="openDetail(${item.id})">
                    <div class="img-portrait-container">
                        <img src="${item.img}" onerror="this.src='https://via.placeholder.com/300x400?text=Produk+Ratu'">
                    </div>
                    <div class="p-2 bg-white">
                        <h3 class="text-[11px] text-gray-700 h-8 line-clamp-2 leading-tight">${item.name}</h3>
                        <div class="mt-2 flex flex-col">
                            <span class="text-red-500 font-bold text-sm">${item.priceText}</span>
                            <div class="flex items-center gap-1 mt-1">
                                <span class="bg-orange-50 text-[8px] text-orange-600 px-1 border border-orange-200">Star+</span>
                                <span class="text-[9px] text-gray-400">1rb+ Terjual</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openDetail(id) {
            selectedItem = collection.find(i => i.id === id);
            document.getElementById('m-img').src = selectedItem.img;
            document.getElementById('m-title').innerText = selectedItem.name;
            document.getElementById('m-price').innerText = selectedItem.priceText;
            document.getElementById('m-desc').innerText = selectedItem.desc;
            
            document.getElementById('modal-detail').classList.add('modal-show');
            
            // Play Audio saat interaksi pertama
            const audio = document.getElementById('audio-player');
            audio.play().catch(() => console.log("Audio butuh interaksi user"));
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('modal-show');
        }

        function openCheckout() {
            closeModal('modal-detail');
            document.getElementById('modal-checkout').classList.add('modal-show');
        }

        function submitOrder() {
            const prov = document.getElementById('inp-prov').value;
            const kota = document.getElementById('inp-kota').value;
            const desa = document.getElementById('inp-desa').value;
            const rt = document.getElementById('inp-rt').value;
            const rumah = document.getElementById('inp-rumah').value;
            const pay = document.getElementById('inp-pay').value;

            if(!prov || !kota || !desa) return alert("Ratu, mohon lengkapi alamat dulu ya! ✨");

            const waMessage = `Halo Ratu Collection! ✨\n\nSAYA MAU PESAN PRODUK INI:\n👑 Nama: *${selectedItem.name}*\n💰 Harga: ${selectedItem.priceText}\n\n📍 *ALAMAT PENGIRIMAN:*\nProv: ${prov}\nKota/Kab: ${kota}\nDesa: ${desa}\nRT/RW: ${rt}\nNo. Rumah: ${rumah}\n\n💳 *METODE PEMBAYARAN:* ${pay}\n\nMohon segera dikonfirmasi ya, Ratu! 👑`;
            
            window.open(`https://wa.me/6285640056650?text=${encodeURIComponent(waMessage)}`);
        }

        // --- INITIALIZER ---
        window.addEventListener('DOMContentLoaded', () => {
            renderItems();
        });
    </script>
</body>
</html>
