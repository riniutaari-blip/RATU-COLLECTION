<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RATU COLLECTION | Official Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root { 
            --shopee-orange: #ee4d2d; 
            --bg-gray: #f5f5f5;
            --gold: #D4AF37;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        
        body { 
            background-color: var(--bg-gray); 
            font-family: -apple-system, Helvetica, Arial, sans-serif;
            margin: 0; padding-bottom: 70px; overflow-x: hidden;
        }

        /* --- ANIMASI LOADING --- */
        #splash-screen {
            position: fixed; inset: 0; background: #fff; z-index: 99999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            animation: fadeOut 0.5s ease 2.5s forwards;
        }
        .loader-ring {
            width: 60px; height: 60px; border: 5px solid #f3f3f3;
            border-top: 5px solid var(--shopee-orange); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* --- HEADER --- */
        .header-sticky {
            background: linear-gradient(180deg, #f53d2d, #ff6633);
            position: sticky; top: 0; z-index: 1000; padding: 10px 15px;
        }

        /* --- PRODUCT GRID (SMALL PORTRAIT 3:4) --- */
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; padding: 6px; }
        .product-card { background: #fff; border-radius: 2px; overflow: hidden; box-shadow: 0 1px 1px rgba(0,0,0,0.1); position: relative; }
        
        .img-container {
            position: relative; width: 100%; padding-top: 133%; /* Rasio Potret 3:4 */
            background: #eee; overflow: hidden;
        }
        .img-container img {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover;
        }

        .mall-tag {
            position: absolute; top: 0; left: 0; background: #d0011b;
            color: white; font-size: 8px; font-weight: bold; padding: 1px 4px;
        }

        /* --- MODAL SYSTEM --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            z-index: 10000; display: none; align-items: flex-end;
            backdrop-filter: blur(2px);
        }
        .modal-content {
            background: #fff; width: 100%; max-height: 85vh;
            border-radius: 15px 15px 0 0; overflow-y: auto;
            transform: translateY(100%); transition: transform 0.3s ease;
        }
        .active .modal-content { transform: translateY(0); }
        .active { display: flex; }

        /* --- CART DRAWER --- */
        #cart-drawer {
            position: fixed; right: 0; top: 0; bottom: 0; width: 100%;
            background: #fff; z-index: 11000; transform: translateX(100%);
            transition: 0.3s; display: flex; flex-direction: column;
        }
        #cart-drawer.open { transform: translateX(0); }

        /* --- BUTTONS --- */
        .btn-orange { background: var(--shopee-orange); color: white; border-radius: 3px; font-weight: bold; }
        .btn-outline { border: 1px solid var(--shopee-orange); color: var(--shopee-orange); border-radius: 3px; }

        /* --- UTILS --- */
        .line-clamp { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="loader-ring"></div>
        <h1 class="mt-4 text-orange-600 font-bold tracking-widest">RATU COLLECTION</h1>
    </div>

    <header class="header-sticky shadow-md">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-full bg-white p-0.5 overflow-hidden">
                <img src="Gemini_Generated_Image_gfusskgfusskgfus.png" class="w-full h-full object-cover rounded-full" onerror="this.src='https://via.placeholder.com/100?text=RC'">
            </div>
            <div class="flex-1 bg-white h-8 rounded-sm flex items-center px-3 gap-2">
                <i class="fas fa-search text-gray-400 text-xs"></i>
                <input type="text" placeholder="Cari di Ratu Collection..." class="text-[11px] w-full bg-transparent">
            </div>
            <div class="relative cursor-pointer" onclick="toggleCart(true)">
                <i class="fas fa-shopping-cart text-white text-lg"></i>
                <span id="cart-badge" class="absolute -top-2 -right-2 bg-white text-red-600 text-[9px] font-bold px-1.5 rounded-full border border-red-500 hidden">0</span>
            </div>
        </div>
    </header>

    <div class="bg-white p-3 mb-2 grid grid-cols-4 gap-4 text-center border-b">
        <div onclick="alert('Voucher Gratis Ongkir Diklaim!')" class="flex flex-col items-center">
            <i class="fas fa-truck text-green-500 text-xl"></i><span class="text-[10px] mt-1">Free Ongkir</span>
        </div>
        <div onclick="alert('Koin Ratu: 5.000')" class="flex flex-col items-center">
            <i class="fas fa-coins text-yellow-500 text-xl"></i><span class="text-[10px] mt-1">Koin</span>
        </div>
        <div onclick="alert('Fitur Live Segera Datang')" class="flex flex-col items-center">
            <i class="fas fa-video text-red-500 text-xl"></i><span class="text-[10px] mt-1">Live</span>
        </div>
        <div onclick="location.reload()" class="flex flex-col items-center">
            <i class="fas fa-sync text-blue-500 text-xl"></i><span class="text-[10px] mt-1">Refresh</span>
        </div>
    </div>

    <main class="p-1">
        <div class="flex items-center gap-2 px-2 py-2">
            <div class="h-4 w-1 bg-red-500"></div>
            <h2 class="text-xs font-bold text-gray-700 uppercase">Koleksi Terbaru Ratu</h2>
        </div>
        <div id="main-grid" class="product-grid">
            </div>
    </main>

    <div id="cart-drawer">
        <div class="p-4 flex items-center gap-4 border-b">
            <i class="fas fa-arrow-left text-orange-600 text-lg" onclick="toggleCart(false)"></i>
            <h2 class="font-bold flex-1 text-center">Keranjang Saya</h2>
        </div>
        <div id="cart-items-list" class="flex-1 overflow-y-auto p-4 bg-gray-50">
            </div>
        <div class="p-4 border-t bg-white">
            <div class="flex justify-between mb-4">
                <span class="text-sm">Total Belanja:</span>
                <span id="cart-total" class="font-bold text-orange-600 text-lg">Rp 0</span>
            </div>
            <button onclick="openCheckoutModal()" class="w-full btn-orange py-3 uppercase text-sm">Checkout Sekarang</button>
        </div>
    </div>

    <div id="modal-detail" class="modal-overlay" onclick="closeM('modal-detail')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="p-4 flex gap-4 border-b">
                <div class="w-24 h-32 rounded border overflow-hidden">
                    <img id="d-img" src="" class="w-full h-full object-cover">
                </div>
                <div class="flex-1">
                    <p id="d-price" class="text-xl font-bold text-red-600"></p>
                    <p class="text-[10px] text-gray-400 mt-1 italic">Tersedia: 99+ Stok</p>
                    <div class="flex gap-1 mt-3">
                        <span class="bg-red-50 text-red-600 text-[8px] border border-red-200 px-1 font-bold">MALL</span>
                        <span class="bg-orange-50 text-orange-600 text-[8px] border border-orange-200 px-1 font-bold">STAR+</span>
                    </div>
                </div>
            </div>
            <div class="p-4 bg-white min-h-[100px]">
                <h3 id="d-name" class="font-bold text-sm mb-2 text-gray-800"></h3>
                <p id="d-desc" class="text-xs text-gray-500 leading-relaxed"></p>
            </div>
            <div class="p-4 flex gap-2 border-t">
                <button onclick="addToCart()" class="flex-1 btn-outline py-3 text-[10px] font-bold uppercase"><i class="fas fa-cart-plus mr-1"></i> + Keranjang</button>
                <button onclick="buyNow()" class="flex-1 btn-orange py-3 text-[10px] font-bold uppercase">Beli Sekarang</button>
            </div>
        </div>
    </div>

    <div id="modal-checkout" class="modal-overlay" onclick="closeM('modal-checkout')">
        <div class="modal-content p-6" onclick="event.stopPropagation()">
            <h3 class="font-bold text-lg mb-4 text-center border-b pb-2">📦 Konfirmasi Order</h3>
            <div class="space-y-3">
                <input type="text" id="form-name" placeholder="Nama Lengkap" class="w-full border p-3 rounded text-sm outline-none">
                <input type="text" id="form-addr" placeholder="Alamat Lengkap (Prov/Kota/RT/RW)" class="w-full border p-3 rounded text-sm">
                <select id="form-pay" class="w-full border p-3 rounded text-sm bg-gray-50 font-bold">
                    <option value="Transfer BCA">Transfer Bank (BCA)</option>
                    <option value="DANA / OVO">E-Wallet (Dana/OVO)</option>
                    <option value="COD">COD - Bayar di Tempat</option>
                </select>
            </div>
            <button onclick="sendOrder()" class="w-full btn-orange py-3 mt-6 uppercase text-sm bg-black">Kirim ke WhatsApp</button>
        </div>
    </div>

    <nav class="fixed bottom-0 inset-x-0 bg-white border-t flex justify-around py-3 z-[1000]">
        <div class="text-orange-600 text-center"><i class="fas fa-home text-xl"></i><p class="text-[9px]">Beranda</p></div>
        <div class="text-gray-400 text-center" onclick="alert('Belum ada video terbaru')"><i class="fas fa-play-circle text-xl"></i><p class="text-[9px]">Video</p></div>
        <div class="text-gray-400 text-center" onclick="alert('Notifikasi Kosong')"><i class="far fa-bell text-xl"></i><p class="text-[9px]">Notifikasi</p></div>
        <div class="text-gray-400 text-center" onclick="showAdmin()"><i class="far fa-user text-xl"></i><p class="text-[9px]">Saya</p></div>
    </nav>

    <audio id="bgm" src="trtasfiq-sad-piano-instrumental-background-music-279069 (1).mp3" loop></audio>

    <script>
        // --- DATA PRODUK ---
        const products = [
            { 
                id: 1, 
                name: "Wong Urip Signature - Black Royal Series 2026", 
                price: 0, 
                priceTxt: "Hubungi Admin", 
                img: encodeURI("foto-1 2026-03-19 at 13.40.41.jpeg"),
                desc: "Koleksi paling dicari dari Ratu Collection. Bahan kain premium berkualitas tinggi."
            },
            { 
                id: 2, 
                name: "Mba Simbet Elegance - Silk Pearl Edition", 
                price: 0, 
                priceTxt: "Stok Terbatas", 
                img: encodeURI("WhatsApp Image 2026-03-19 at 13.40.16.jpeg"),
                desc: "Gaun sutra premium dengan potongan desain eksklusif internasional."
            },
            { 
                id: 3, 
                name: "Handbag Majesty Gold - International Grade", 
                price: 850000, 
                priceTxt: "Rp 850.000", 
                img: "https://images.unsplash.com/photo-1590874103328-eac38a683ce7?w=500",
                desc: "Tas impor dengan material premium dan aksen emas mewah."
            },
            { 
                id: 4, 
                name: "Cincin Mahkota Berlian Simulasi 24K", 
                price: 1250000, 
                priceTxt: "Rp 1.250.000", 
                img: "https://images.unsplash.com/photo-1605100804763-247f66122bc8?w=500",
                desc: "Perhiasan mahakarya khas Ratu Collection untuk mempercantik jemari Anda."
            },
            { 
                id: 5, 
                name: "Royal Velvet Heels - Gold Edition", 
                price: 1500000, 
                priceTxt: "Rp 1.500.000", 
                img: "https://images.unsplash.com/photo-1543163521-1bf539c55dd2?w=500",
                desc: "Langkah kaki mewah dengan heels bertahtakan aksen emas dan kain beludru."
            },
            { 
                id: 6, 
                name: "Syal Sutra Ratu - Batik Golden Series", 
                price: 350000, 
                priceTxt: "Rp 350.000", 
                img: "https://images.unsplash.com/photo-1584030373081-f37b7bb4fa82?w=500",
                desc: "Aksesori pelengkap gaya Ratu yang elegan dan sangat halus di kulit."
            }
        ];

        let cart = [];
        let activeP = null;
        let adminPhone = "6285640056650";

        // --- RENDER PRODUK ---
        function renderItems() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = products.map(p => `
                <div class="product-card" onclick="openDetail(${p.id})">
                    <span class="mall-tag">Mall</span>
                    <div class="img-container">
                        <img src="${p.img}" onerror="this.src='https://via.placeholder.com/300x400?text=Produk+Ratu'">
                    </div>
                    <div class="p-2">
                        <h3 class="text-[11px] line-clamp leading-tight h-7 font-medium text-gray-700">${p.name}</h3>
                        <p class="text-orange-600 font-bold text-sm mt-2">${p.priceTxt}</p>
                        <div class="flex items-center gap-1 mt-1">
                            <span class="text-[8px] bg-orange-50 text-orange-600 border border-orange-200 px-1">Extra</span>
                            <span class="text-[9px] text-gray-400">1rb+ Terjual</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // --- LOGIKA KERANJANG (CORE) ---
        function toggleCart(show) {
            document.getElementById('cart-drawer').classList.toggle('open', show);
            if(show) renderCartItems();
        }

        function addToCart() {
            const existing = cart.find(item => item.id === activeP.id);
            if(existing) {
                existing.qty += 1;
            } else {
                cart.push({ ...activeP, qty: 1 });
            }
            updateCartUI();
            closeM('modal-detail');
            alert("✨ Berhasil masuk keranjang, Ratu!");
        }

        function updateCartUI() {
            const badge = document.getElementById('cart-badge');
            const totalQty = cart.reduce((acc, curr) => acc + curr.qty, 0);
            if(totalQty > 0) {
                badge.innerText = totalQty;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        function renderCartItems() {
            const list = document.getElementById('cart-items-list');
            const totalEl = document.getElementById('cart-total');
            
            if(cart.length === 0) {
                list.innerHTML = `<div class="text-center mt-20 text-gray-400 text-sm"><i class="fas fa-shopping-basket text-4xl mb-4 opacity-20"></i><br>Keranjang Ratu masih kosong...</div>`;
                totalEl.innerText = "Rp 0";
                return;
            }

            let total = 0;
            list.innerHTML = cart.map(item => {
                total += (item.price * item.qty);
                return `
                    <div class="bg-white p-3 rounded shadow-sm mb-3 flex gap-3 items-center">
                        <img src="${item.img}" class="w-14 h-18 object-cover rounded border">
                        <div class="flex-1">
                            <h4 class="text-xs font-bold text-gray-700 line-clamp">${item.name}</h4>
                            <p class="text-orange-600 font-bold text-xs mt-1">${item.priceTxt}</p>
                            <div class="flex items-center gap-4 mt-2">
                                <button onclick="changeQty(${item.id}, -1)" class="w-6 h-6 border flex items-center justify-center rounded text-gray-500">-</button>
                                <span class="text-sm font-bold">${item.qty}</span>
                                <button onclick="changeQty(${item.id}, 1)" class="w-6 h-6 border flex items-center justify-center rounded text-gray-500">+</button>
                            </div>
                        </div>
                        <i class="far fa-trash-alt text-gray-300" onclick="removeItem(${item.id})"></i>
                    </div>
                `;
            }).join('');
            totalEl.innerText = total > 0 ? "Rp " + total.toLocaleString('id-ID') : "Rp -";
        }

        function changeQty(id, delta) {
            const item = cart.find(i => i.id === id);
            item.qty += delta;
            if(item.qty < 1) removeItem(id);
            renderCartItems();
            updateCartUI();
        }

        function removeItem(id) {
            cart = cart.filter(i => i.id !== id);
            renderCartItems();
            updateCartUI();
        }

        // --- MODAL CONTROL ---
        function openDetail(id) {
            activeP = products.find(p => p.id === id);
            document.getElementById('d-img').src = activeP.img;
            document.getElementById('d-name').innerText = activeP.name;
            document.getElementById('d-price').innerText = activeP.priceTxt;
            document.getElementById('d-desc').innerText = activeP.desc;
            document.getElementById('modal-detail').classList.add('active');
            document.getElementById('bgm').play().catch(() => {});
        }

        function buyNow() {
            addToCart();
            toggleCart(true);
        }

        function openCheckoutModal() {
            if(cart.length === 0) return alert("Belum ada barang dipilih, Ratu!");
            document.getElementById('modal-checkout').classList.add('active');
        }

        function closeM(id) { document.getElementById(id).classList.remove('active'); }

        // --- ORDER TO WA ---
        function sendOrder() {
            const name = document.getElementById('form-name').value;
            const addr = document.getElementById('form-addr').value;
            const pay = document.getElementById('form-pay').value;

            if(!name || !addr) return alert("Mohon lengkapi data Ratu dulu ya!");

            let productList = cart.map(i => `- ${i.name} (${i.qty}x) [${i.priceTxt}]`).join('\n');
            let totalTxt = document.getElementById('cart-total').innerText;

            const msg = `Halo Ratu Collection! ✨\n\nSAYA MAU ORDER:\n${productList}\n\n💰 *TOTAL:* ${totalTxt}\n\n📍 *DATA PENERIMA:*\nNama: ${name}\nAlamat: ${addr}\n💳 Pembayaran: ${pay}\n\nMohon dikonfirmasi pesanannya ya! 👑`;
            
            window.open(`https://wa.me/${adminPhone}?text=${encodeURIComponent(msg)}`);
        }

        function showAdmin() {
            const pw = prompt("Akses Admin:");
            if(pw === "ratu") {
                const n = prompt("Update No WA (628...):", adminPhone);
                if(n) adminPhone = n;
            }
        }

        window.onload = renderItems;
    </script>
</body>
</html>
