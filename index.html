<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RATU COLLECTION | Official Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark: #0a0a0a; --glass: rgba(255, 255, 255, 0.1); }
        body { background-color: var(--dark); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }

        /* CINEMATIC INTRO ALA MARVEL/DISNEY */
        #intro-overlay {
            position: fixed; inset: 0; background: black; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            animation: fadeOut 1s ease 4s forwards;
        }
        .cinematic-text {
            font-size: 3rem; font-weight: 900; letter-spacing: 15px; color: transparent;
            background: linear-gradient(90deg, #fff, var(--gold), #fff);
            background-size: 200% auto; -webkit-background-clip: text;
            animation: shine 3s linear infinite, zoomIn 4s ease-out forwards;
            text-transform: uppercase; text-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
        }
        @keyframes shine { to { background-position: 200% center; } }
        @keyframes zoomIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1.1); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* GLASSMORPHISM DESIGN */
        .glass { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
        .gold-gradient { background: linear-gradient(135deg, #D4AF37 0%, #FBE106 100%); color: black; }
        .product-card:hover { transform: translateY(-10px); transition: 0.3s; border-color: var(--gold); }
        
        /* HIDDEN ELEMENTS */
        #admin-panel { display: none; position: fixed; top: 0; right: 0; width: 300px; height: 100%; z-index: 1000; padding: 20px; overflow-y: auto; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <h1 class="cinematic-text">RATU COLLECTION</h1>
        <audio id="intro-audio" src="https://www.soundjay.com/buttons/sounds/beep-01a.mp3"></audio>
    </div>

    <nav class="p-5 flex justify-between items-center glass m-4 sticky top-4 z-50">
        <div class="flex items-center gap-3">
            <img id="main-logo" src="https://via.placeholder.com/50/D4AF37/000000?text=👑" class="w-12 h-12 rounded-full border-2 border-gold shadow-lg cursor-pointer" onclick="toggleAdmin()">
            <h2 class="text-xl font-bold tracking-widest text-gold uppercase">Ratu Collection</h2>
        </div>
        <div class="flex gap-4 items-center">
            <i class="fas fa-shield-halved text-green-500" title="System Protected by IPS/Firewall"></i>
            <button onclick="openCart()" class="relative"><i class="fas fa-shopping-bag text-2xl"></i><span id="cart-count" class="absolute -top-2 -right-2 bg-red-600 text-white text-xs px-2 rounded-full">0</span></button>
        </div>
    </nav>

    <div class="px-6 py-10 text-center">
        <h3 class="text-4xl font-extrabold mb-2 uppercase italic">Elegan & Mewah</h3>
        <p class="text-gray-400">Koleksi Terpilih untuk Ratu Sejati</p>
    </div>

    <div id="product-container" class="grid grid-cols-2 md:grid-cols-4 gap-6 p-6">
        </div>

    <div id="admin-panel" class="glass bg-black shadow-2xl">
        <h3 class="text-gold font-bold mb-4 border-b border-gold pb-2"><i class="fas fa-user-shield"></i> Cyber Security Admin</h3>
        
        <label class="block mb-2 text-sm">Ganti Logo Toko:</label>
        <button onclick="document.getElementById('logo-upload').click()" class="w-full p-2 bg-white/10 rounded mb-4 text-xs"><i class="fas fa-upload"></i> Upload Logo Baru</button>
        <input type="file" id="logo-upload" accept="image/*" onchange="handleLogo(event)">

        <label class="block mb-2 text-sm">Ganti Musik Web:</label>
        <button onclick="document.getElementById('audio-upload').click()" class="w-full p-2 bg-white/10 rounded mb-4 text-xs"><i class="fas fa-music"></i> Upload Audio (.mp3)</button>
        <input type="file" id="audio-upload" accept="audio/*" onchange="handleAudio(event)">

        <label class="block mb-2 text-sm">Nomor WhatsApp (Admin):</label>
        <input type="text" id="wa-number" placeholder="628xxxx" class="w-full p-2 rounded bg-black border border-gray-700 mb-4 text-sm">

        <h4 class="text-xs text-gray-500 mb-2 uppercase">Sistem Keamanan</h4>
        <div class="text-[10px] space-y-1">
            <p><i class="fas fa-check text-green-500"></i> Firewall: Active</p>
            <p><i class="fas fa-check text-green-500"></i> IPS/IDS: Monitoring</p>
            <p><i class="fas fa-check text-green-500"></i> SIEM Log: Encrypted</p>
        </div>
        <button onclick="toggleAdmin()" class="w-full mt-6 p-2 bg-red-600 rounded text-sm">Tutup</button>
    </div>

    <audio id="bg-music" loop></audio>

    <script>
        // --- DATABASE & SECURITY LOGIC ---
        let products = [
            { id: 1, name: "Luxury Gold Dress", price: 850000, img: "https://via.placeholder.com/300" },
            { id: 2, name: "Ratu Silk Scarf", price: 150000, img: "https://via.placeholder.com/300" }
        ];
        let cart = [];
        let waNumber = "628123456789";

        // --- CORE FUNCTIONS ---
        function renderProducts() {
            const container = document.getElementById('product-container');
            container.innerHTML = products.map(p => `
                <div class="product-card glass p-4 text-center">
                    <img src="${p.img}" class="w-full h-48 object-cover rounded-xl mb-4 shadow-md">
                    <h4 class="font-bold text-sm h-10 overflow-hidden">${p.name}</h4>
                    <p class="text-gold font-bold my-2">Rp ${p.price.toLocaleString()}</p>
                    <button onclick="addToCart(${p.id})" class="gold-gradient w-full py-2 rounded-lg text-xs font-bold uppercase active:scale-95 transition"><i class="fas fa-cart-plus"></i> Beli</button>
                </div>
            `).join('');
        }

        // --- UPLOAD LOGIC (HIGH LEVEL) ---
        function handleLogo(event) {
            const file = event.target.files[0];
            if (file && file.size < 2000000) { // Firewall: Maks 2MB
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('main-logo').src = e.target.result;
                    alert("Logo Berhasil Diperbarui secara Aman! ✅");
                };
                reader.readAsDataURL(file);
            } else { alert("IPS Alert: File terlalu besar atau berbahaya! ❌"); }
        }

        function handleAudio(event) {
            const file = event.target.files[0];
            const audio = document.getElementById('bg-music');
            const reader = new FileReader();
            reader.onload = (e) => {
                audio.src = e.target.result;
                audio.play();
                alert("Musik Toko Aktif! 🎵");
            };
            reader.readAsDataURL(file);
        }

        // --- SYSTEM FUNCTIONS ---
        function toggleAdmin() {
            const panel = document.getElementById('admin-panel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        function addToCart(id) {
            const prod = products.find(p => p.id === id);
            cart.push(prod);
            document.getElementById('cart-count').innerText = cart.length;
            // Virtual IPS Log
            console.log(`[SIEM] Item added: ${prod.name}`);
        }

        function openCart() {
            if (cart.length === 0) return alert("Keranjang masih kosong, Ratu!");
            let msg = `Halo Ratu Collection, saya mau order:\n\n`;
            cart.forEach((item, i) => { msg += `${i+1}. ${item.name} - Rp${item.price.toLocaleString()}\n`; });
            window.open(`https://wa.me/${waNumber}?text=${encodeURIComponent(msg)}`);
        }

        // --- INITIALIZATION ---
        window.onload = () => {
            renderProducts();
            document.getElementById('intro-audio').play().catch(() => {});
            console.log("Cybersecurity Systems Initialized. All systems green. ✅");
        };
    </script>
</body>
</html>
